<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神經醫學工作平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 自定義捲軸樣式 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* 動態顏色類別 */
        .active-form {
            background-color: #eff6ff;
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }
        .active-tool {
            background-color: #f0fdf4;
            color: #16a34a;
            border-right: 4px solid #16a34a;
        }
        .active-OPDtool {
            background-color: #fff5f7;
            color: #a3161f;
            border-right: 4px solid #a3161f;
        }
        .active-report {
            background-color: #faf5ff;
            color: #9333ea;
            border-right: 4px solid #9333ea;
        }
        
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        /* 彈出視窗動畫 */
        .popup-hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }
        .popup-visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col">

    <!-- 頂部標題列 -->
    <header class="bg-white border-b border-gray-200 h-14 flex items-center justify-between px-6 z-20 shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="bg-slate-800 p-1.5 rounded-lg">
                <i data-lucide="activity" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-lg font-bold text-gray-800 tracking-tight">神經醫學工作平台 <span class="text-xs font-normal text-gray-400 ml-2">NeuroApp Hub</span></h1>
        </div>
        
        <div class="flex items-center space-x-4">
            <!-- 新增：衛教單張按鈕 -->
            <button onclick="togglePopup()" class="flex items-center space-x-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-full transition-all text-sm font-medium border border-slate-200">
                <i data-lucide="users" class="w-4 h-4 text-slate-500"></i>
                <span>衛教單張</span>
            </button>

            <div class="h-4 w-px bg-gray-300"></div>
            
            <div class="flex items-center space-x-3 text-sm text-gray-500">
                <span id="current-page-title" class="font-medium text-slate-600 transition-colors duration-300">初診問卷</span>
                <div class="h-4 w-px bg-gray-300"></div>
                <div class="flex items-center space-x-2">
                    <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                    <span id="clock" class="font-mono"></span>
                </div>
            </div>
        </div>
    </header>

    <!-- 衛教單張查詢 Popup 視窗 -->
    <div id="popup-overlay" class="fixed inset-0 z-40 bg-black/20 backdrop-blur-[1px] hidden" onclick="togglePopup()"></div>
    <div id="regist-popup" class="fixed top-16 right-6 w-[450px] h-[600px] z-50 bg-white rounded-xl shadow-2xl border border-gray-200 transition-all duration-200 popup-hidden flex flex-col overflow-hidden">
        <div class="p-3 bg-slate-50 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center space-x-2 text-slate-700 font-bold">
                <i data-lucide="external-link" class="w-4 h-4 text-blue-500"></i>
                <span class="text-sm">衛教單張查詢</span>
            </div>
            <button onclick="togglePopup()" class="text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="flex-1 bg-white">
            <iframe id="popup-frame" src="about:blank" class="w-full h-full"></iframe>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- 左側導覽列 -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col overflow-y-auto">
            <nav class="flex-1 py-4 space-y-4">
                
                <!-- 表單類 - 藍色系 -->
                <div class="bg-blue-50/30 pb-2">
                    <h2 class="px-6 py-2 text-xs font-bold text-blue-600 uppercase tracking-wider flex items-center border-b border-blue-100 mb-1">
                        <i data-lucide="clipboard-list" class="w-3.5 h-3.5 mr-2"></i>表單類
                    </h2>
                    <ul class="space-y-0.5">
                        <li>
                            <button onclick="loadPage('初診問卷', 'https://ycliaw1201.github.io/neuroapp/OPD_NewCase.html', this, 'form')" 
                                    class="sidebar-item active-form w-full flex items-center px-6 py-2 text-sm font-medium transition-colors hover:bg-blue-50">
                                初診問卷
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('失智問卷', 'https://ycliaw1201.github.io/neuroapp/OPD_Dementia.html', this, 'form')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-blue-50">
                                失智問卷
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('頭暈問卷', 'https://ycliaw1201.github.io/neuroapp/OPD_Dizziness.html', this, 'form')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-blue-50">
                                頭暈問卷
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('頭痛問卷', 'https://ycliaw1201.github.io/neuroapp/OPD_HA.html', this, 'form')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-blue-50">
                                頭痛問卷
                            </button>
                        </li>
                    </ul>
                </div>

                <!-- 工具類 - 綠色系 -->
                <div class="bg-green-50/30 pb-2">
                    <h2 class="px-6 py-2 text-xs font-bold text-green-600 uppercase tracking-wider flex items-center border-b border-green-100 mb-1">
                        <i data-lucide="wrench" class="w-3.5 h-3.5 mr-2"></i>工具類
                    </h2>
                    <ul class="space-y-0.5">
                        <li>
                            <button onclick="loadPage('UPDRS', 'https://ycliaw1201.github.io/neuroapp/OPD_UPDRS.html', this, 'tool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-green-50">
                                UPDRS
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('LEDD Calc', 'https://ycliaw1201.github.io/neuroapp/LEDD.html', this, 'tool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-green-50">
                                LEDD 計算機
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('整理數據', 'https://ycliaw1201.github.io/neuroapp/OPD_datacleaner.html', this, 'tool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-green-50">
                                整理數據
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('頭痛日記', 'https://ycliaw1201.github.io/neuroapp/Form_HA_Rx.html', this, 'tool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-green-50">
                                頭痛日記（門診）
                            </button>
                        </li>
                         <li>
                            <button onclick="loadPage('住院頭痛紀錄', 'https://ycliaw1201.github.io/neuroapp/Form_ADM_HA.html', this, 'tool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-green-50">
                                頭痛紀錄（住院）
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('門診加掛單', 'https://ycliaw1201.github.io/neuroapp/OPD_Add.html', this, 'tool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-green-50">
                                門診加掛單
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('ICD-10查詢', 'https://ycliaw1201.github.io/neuroapp/OPD_ICD10.html', this, 'tool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2.5 text-sm font-medium transition-colors text-gray-600 hover:bg-green-50">
                                ICD-10查詢
                            </button>
                        </li>
                    </ul>
                </div>

                <!-- 病歷工具 - 紅色系 -->
                <div class="bg-red-50/30 pb-2">
                    <h2 class="px-6 py-2 text-xs font-bold text-red-600 uppercase tracking-wider flex items-center border-b border-red-100 mb-1">
                        <i data-lucide="wrench" class="w-3.5 h-3.5 mr-2"></i>工具類
                    </h2>
                    <ul class="space-y-0.5">
                        <li>
                            <button onclick="loadPage('UPDRS', 'https://ycliaw1201.github.io/neuroapp/OPD_UPDRS.html', this, 'OPDtool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-red-50">
                                UPDRS
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('LEDD Calc', 'https://ycliaw1201.github.io/neuroapp/LEDD.html', this, 'OPDtool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-red-50">
                                LEDD 計算機
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('整理數據', 'https://ycliaw1201.github.io/neuroapp/OPD_datacleaner.html', this, 'OPDtool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-red-50">
                                整理數據
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('頭痛日記', 'https://ycliaw1201.github.io/neuroapp/Form_HA_Rx.html', this, 'OPDtool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-red-50">
                                頭痛日記（門診）
                            </button>
                        </li>
                         <li>
                            <button onclick="loadPage('住院頭痛紀錄', 'https://ycliaw1201.github.io/neuroapp/Form_ADM_HA.html', this, 'OPDtool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-red-50">
                                頭痛紀錄（住院）
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('門診加掛單', 'https://ycliaw1201.github.io/neuroapp/OPD_Add.html', this, 'OPDtool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-red-50">
                                門診加掛單
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('ICD-10查詢', 'https://ycliaw1201.github.io/neuroapp/OPD_ICD10.html', this, 'OPDtool')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2.5 text-sm font-medium transition-colors text-gray-600 hover:bg-red-50">
                                ICD-10查詢
                            </button>
                        </li>
                    </ul>
                </div>


                
                <!-- 報告類 - 紫色系 -->
                <div class="bg-purple-50/30 pb-2">
                    <h2 class="px-6 py-2 text-xs font-bold text-purple-600 uppercase tracking-wider flex items-center border-b border-purple-100 mb-1">
                        <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2"></i>報告類
                    </h2>
                    <ul class="space-y-0.5">
                        <li>
                            <button onclick="loadPage('超音波報告', 'https://ycliaw1201.github.io/neuroapp/Form_ECDTCD.html', this, 'report')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-purple-50">
                                超音波報告
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('NCS/EMG報告', 'https://ycliaw1201.github.io/neuroapp/Form_EMGNCS.html', this, 'report')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-purple-50">
                                NCS/EMG報告
                            </button>
                        </li>
                        <li>
                            <button onclick="loadPage('其他電生理報告', 'https://ycliaw1201.github.io/neuroapp/Form_ElecStudies.html', this, 'report')" 
                                    class="sidebar-item w-full flex items-center px-6 py-2 text-sm font-medium transition-colors text-gray-600 hover:bg-purple-50">
                                其他電生理報告
                            </button>
                        </li>
                    </ul>
                </div>

            </nav>
            
            <!-- 底部資訊 -->
            <div class="p-4 border-t border-gray-100 bg-gray-50">
                <div class="flex items-center space-x-2 text-xs text-gray-400">
                    <i data-lucide="info" class="w-3 h-3"></i>
                    <span>請確保網路連接正常</span>
                </div>
            </div>
        </aside>

        <!-- 右側內容區域 -->
        <main class="flex-1 relative bg-gray-100">
            <!-- 載入動畫 -->
            <div id="loader" class="absolute inset-0 flex items-center justify-center bg-gray-100 z-0">
                <div class="flex flex-col items-center">
                    <div id="spinner" class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-2"></div>
                    <span class="text-sm text-gray-500">正在載入頁面...</span>
                </div>
            </div>
            
            <!-- 內容 Iframe -->
            <iframe id="main-frame" src="https://ycliaw1201.github.io/neuroapp/OPD_NewCase.html" onload="hideLoader()"></iframe>
        </main>
    </div>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        // 載入頁面函式
        function loadPage(title, url, element, type) {
            const frame = document.getElementById('main-frame');
            const loader = document.getElementById('loader');
            const spinner = document.getElementById('spinner');
            const titleDisplay = document.getElementById('current-page-title');
            
            // 根據類別調整顏色
            let activeClass = '';
            let spinnerColor = '';
            let titleColor = '';
            
            if (type === 'form') {
                activeClass = 'active-form';
                spinnerColor = 'border-blue-600';
                titleColor = 'text-blue-600';
            } else if (type === 'tool') {
                activeClass = 'active-tool';
                spinnerColor = 'border-green-600';
                titleColor = 'text-green-600';
            } else if (type === 'OPDtool') {
                activeClass = 'active-OPDtool';
                spinnerColor = 'border-red-600';
                titleColor = 'text-red-600';
            } else if (type === 'report') {
                activeClass = 'active-report';
                spinnerColor = 'border-purple-600';
                titleColor = 'text-purple-600';
            }
            
            // 顯示載入動畫並換色
            loader.style.display = 'flex';
            spinner.className = `animate-spin rounded-full h-10 w-10 border-b-2 ${spinnerColor} mb-2`;
            
            // 更新 Iframe 網址
            frame.src = url;
            
            // 更新標題
            titleDisplay.innerText = title;
            titleDisplay.className = `font-medium ${titleColor} transition-colors duration-300`;
            
            // 清除所有側邊欄項目的狀態
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active-form', 'active-tool',  'active-OPDtool', 'active-report');
                item.classList.remove('text-blue-600', 'text-green-600',  'text-red-600', 'text-purple-600');
                item.classList.add('text-gray-600');
            });
            
            // 套用新狀態
            element.classList.add(activeClass);
            element.classList.remove('text-gray-600');
        }

        // 彈出視窗切換
        function togglePopup() {
            const popup = document.getElementById('regist-popup');
            const overlay = document.getElementById('popup-overlay');
            const frame = document.getElementById('popup-frame');
            const targetUrl = "https://ycliaw1201.github.io/neuroapp/Education.html";

            if (popup.classList.contains('popup-hidden')) {
                // 開啟
                popup.classList.remove('popup-hidden', 'hidden');
                popup.classList.add('popup-visible');
                overlay.classList.remove('hidden');
                // 延遲加載 Iframe 內容以節省資源
                if (frame.src === "about:blank") {
                    frame.src = targetUrl;
                }
            } else {
                // 關閉
                popup.classList.add('popup-hidden');
                popup.classList.remove('popup-visible');
                overlay.classList.add('hidden');
            }
        }

        // 隱藏載入動畫
        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
        }

        // 更新時間
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('clock').innerText = timeString;
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
