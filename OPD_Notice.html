<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就診與說明單產生器 - 廖誼佳醫師</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas & jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止整個網頁出現卷軸 */
            height: 100vh;
        }

        /* A5 原始尺寸 (210mm x 148mm) */
        .a5-landscape {
            font-family: 'Noto Sans TC', sans-serif;
            width: 210mm;
            height: 148mm;
            background: white;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            flex-shrink: 0;
            color: #1a1a1a;
            visibility: hidden; 
        }

        .preview-area {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .highlight-text {
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen w-screen">

    <!-- 左側：輸入表單 (可獨立捲動) -->
    <div class="w-full lg:w-[400px] h-full bg-white shadow-2xl z-20 flex flex-col border-r border-gray-200">
        <!-- 標題區 -->
        <div class="p-6 border-b border-gray-100 bg-white sticky top-0 z-10">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
                說明單設定
            </h1>
        </div>

        <!-- 表單滾動區 -->
        <div class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
            <form id="addonForm" class="space-y-6">
                
                <!-- 基本資料區塊：科別、醫師 -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">科別</label>
                        <input type="text" id="deptInput" value="神經內科" class="w-full border border-gray-300 rounded-lg p-2.5 font-bold text-gray-800 focus:ring-2 focus:ring-gray-500 outline-none transition" oninput="updatePreview()">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">醫師姓名</label>
                        <div class="relative">
                            <input type="text" id="drInput" value="廖誼佳" placeholder="輸入姓名" class="w-full border border-gray-300 rounded-lg p-2.5 font-bold text-gray-800 focus:ring-2 focus:ring-gray-500 outline-none transition" oninput="updatePreview()">
                            <div class="absolute right-3 top-3 text-gray-400 text-sm font-medium pointer-events-none">醫師</div>
                        </div>
                    </div>
                </div>

                <!-- 自訂說明內容區塊 -->
                <div>
                    <label class="block text-base font-bold text-gray-800 mb-3 pl-2 border-l-4 border-gray-600">說明內容</label>
                    
                    <!-- 快速輸入按鈕 -->
                    <div class="flex flex-wrap gap-2 mb-3">
                        <button type="button" onclick="setQuickText('看報告')" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-800 border border-gray-300 py-1.5 px-3 rounded-lg font-bold transition flex items-center gap-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                            </svg>
                            看報告
                        </button>
                        <button type="button" onclick="setQuickText('掛其他醫師')" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-800 border border-gray-300 py-1.5 px-3 rounded-lg font-bold transition flex items-center gap-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                            </svg>
                            掛其他醫師門診
                        </button>
                        <button type="button" onclick="setQuickText('清空')" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-200 py-1.5 px-3 rounded-lg font-medium transition ml-auto">
                            清空
                        </button>
                    </div>

                    <textarea id="messageInput" rows="6" class="w-full border-2 border-gray-300 rounded-lg p-3 font-bold text-gray-800 focus:ring-2 focus:ring-gray-500 outline-none transition resize-none leading-relaxed" placeholder="請在此輸入要顯示在單子上的文字..." oninput="updatePreview()"></textarea>
                </div>

            </form>
        </div>

        <!-- 底部按鈕區 -->
        <div class="p-6 border-t border-gray-200 bg-gray-50">
            <button type="button" onclick="generatePDF()" class="w-full bg-black hover:bg-gray-800 text-white font-bold text-lg py-4 px-6 rounded-xl shadow-lg transform transition active:scale-[0.98] flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                下載 PDF (A5)
            </button>
        </div>
    </div>

    <!-- 右側：自動縮放預覽區 -->
    <div class="flex-1 h-full preview-area relative overflow-hidden flex items-center justify-center p-8">
        
        <!-- 浮動提示 -->
        <div class="absolute top-6 bg-white/80 backdrop-blur px-4 py-2 rounded-full text-sm text-gray-500 shadow-sm border border-gray-200 z-10">
            即時預覽 (自動縮放)
        </div>

        <!-- 縮放容器 -->
        <div id="preview-wrapper" style="transform-origin: center center; transition: transform 0.2s;">
            <!-- A5 內容 -->
            <div id="slip-content" class="a5-landscape p-8 bg-white flex flex-col relative justify-between border-8 border-white">
                
                <!-- 內縮裝飾框 -->
                <div class="absolute inset-3 border-2 border-gray-800 rounded-xl pointer-events-none"></div>
                
                <!-- 頂部區塊：抬頭式設計 -->
                <div class="flex justify-between items-end border-b-[3px] border-black pb-3 mx-4 mt-2 relative z-10">
                    <h1 class="text-4xl font-black tracking-widest text-black font-serif">就診注意事項</h1>
                    <div class="text-right flex flex-col items-end">
                        <div class="text-lg font-bold text-gray-600 tracking-wider mb-1" id="display-dept">神經內科</div>
                        <div class="text-2xl font-black text-black leading-none" id="display-dr">廖誼佳 醫師</div>
                    </div>
                </div>

                <!-- 主要內容區 (文字說明) -->
                <div class="flex-grow flex flex-col justify-center px-6 relative z-10 my-4">
                    <div class="bg-white border-2 border-l-8 border-black p-8 rounded-2xl shadow-none min-h-[200px] flex items-center">
                        <!-- whitespace-pre-wrap 允許換行符號(\n)正常顯示 -->
                        <div id="display-message" class="text-[2.1rem] font-black text-black leading-[1.6] tracking-wide whitespace-pre-wrap w-full">
                            <!-- JS將會填入文字 -->
                        </div>
                    </div>
                </div>

                <!-- 底部簽核 -->
                <div class="flex justify-between items-end px-4 mb-2 relative z-10">
                    <div class="text-sm text-gray-500 font-medium">
                        開立日期：<span id="current-date" class="text-black font-bold"></span>
                    </div>
                    <div class="text-center">
                        <div class="h-8 w-40 border-b-2 border-black mb-1"></div>
                        <div class="text-sm font-bold text-black tracking-widest">醫師 / 護理師 簽章</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- 初始化 ---
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');

        // 預設填入「看報告」的文字
        window.onload = function() {
            setQuickText('看報告');
            fitPreviewToScreen();
        };

        // --- 快速輸入按鈕邏輯 ---
        function setQuickText(type) {
            const textarea = document.getElementById('messageInput');
            if (type === '看報告') {
                textarea.value = "門診時間僅為預約用。\n同一天做完檢查後，請直接就診看報告。";
            } else if (type === '掛其他醫師') {
                textarea.value = "科別：\n\n原因：\n\n再請您高診";
            } else if (type === '清空') {
                textarea.value = "";
            }
            updatePreview();
        }

        // --- 即時預覽更新邏輯 ---
        function updatePreview() {
            // 更新開立日期 (頁尾 - 固定為今天)
            document.getElementById('current-date').textContent = `${yyyy}/${mm}/${dd}`;

            // 更新科別與醫師
            document.getElementById('display-dept').textContent = document.getElementById('deptInput').value || " ";
            const drName = document.getElementById('drInput').value.trim();
            document.getElementById('display-dr').textContent = drName ? `${drName} 醫師` : " 醫師";

            // 更新自訂訊息
            const message = document.getElementById('messageInput').value;
            document.getElementById('display-message').textContent = message;
        }

        // --- 自動縮放邏輯 (Auto Fit) ---
        function fitPreviewToScreen() {
            const container = document.querySelector('.preview-area');
            const wrapper = document.getElementById('preview-wrapper');
            const content = document.getElementById('slip-content');

            if (!container || !wrapper || !content) return;

            const containerWidth = container.clientWidth - 64; 
            const containerHeight = container.clientHeight - 64;

            const contentWidth = content.offsetWidth;
            const contentHeight = content.offsetHeight;

            const scaleX = containerWidth / contentWidth;
            const scaleY = containerHeight / contentHeight;
            const scale = Math.min(scaleX, scaleY) * 0.95;

            wrapper.style.transform = `scale(${scale})`;
            content.style.visibility = 'visible';
        }

        window.addEventListener('resize', fitPreviewToScreen);
        setTimeout(fitPreviewToScreen, 500);

        // --- PDF 下載邏輯 ---
        async function generatePDF() {
            const originalElement = document.getElementById('slip-content');
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `<span class="animate-spin inline-block mr-2 border-2 border-white border-t-transparent rounded-full w-4 h-4"></span> 處理中...`;
            btn.disabled = true;

            try {
                // 1. 複製元素 (避免縮放偏移)
                const clonedElement = originalElement.cloneNode(true);
                const container = document.createElement('div');
                container.style.position = 'absolute';
                container.style.top = '0';
                container.style.left = '0';
                container.style.zIndex = '-1000';
                container.style.width = '210mm';
                container.style.height = '148mm';
                container.style.overflow = 'hidden';
                container.appendChild(clonedElement);
                document.body.appendChild(container);

                clonedElement.style.visibility = 'visible';
                clonedElement.style.transform = 'none';

                // 2. 截圖
                const canvas = await html2canvas(clonedElement, {
                    scale: 3, 
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#ffffff'
                });

                document.body.removeChild(container);

                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'mm',
                    format: 'a5'
                });

                const pdfWidth = 210;
                const pdfHeight = 148;

                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);

                const drName = document.getElementById('drInput').value.replace(/\s/g, '') || '醫師';
                
                // 檔名使用當天日期
                const dateFilename = `${yyyy}${mm}${dd}`; 
                const filename = `說明單_${drName}_${dateFilename}.pdf`;
                
                pdf.save(filename);

            } catch (error) {
                console.error('PDF Generation Error:', error);
                alert('PDF 產生失敗，請再試一次。');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
