<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDD Calculator - Clean Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
            background-color: #f8fafc;
        }
        
        .mono {
            font-family: 'JetBrains Mono', 'ui-monospace', monospace;
        }

        /* 移除 Chrome/Safari 的數字箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .input-cell {
            @apply w-full box-border px-2 py-2 text-center bg-white border border-slate-300 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all font-semibold shadow-sm;
            max-width: 100%;
        }

        /* 色塊分組樣式 */
        .group-levodopa { background-color: #f0f7ff; border-left: 6px solid #3b82f6; }
        .group-ropinirole { background-color: #f0fdf4; border-left: 6px solid #22c55e; }
        .group-pramipexole { background-color: #fffbeb; border-left: 6px solid #f59e0b; }
        .group-others { background-color: #ffffff; border-left: 6px solid #94a3b8; }
        
        tr:hover { filter: brightness(0.97); }
        
        .sticky-card {
            position: sticky;
            top: 1.5rem;
        }

        table {
            table-layout: fixed;
            width: 100%;
            border-collapse: collapse;
        }
        td, th {
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-[1300px] mx-auto">
        <div class="flex flex-col lg:flex-row gap-8 items-start">
            
            <!-- Left Side: Table -->
            <div class="w-full lg:flex-1 order-2 lg:order-1">
                <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                    <table>
                        <thead class="bg-slate-800 text-white text-[14px] uppercase tracking-wider">
                            <tr>
                                <th class="px-4 py-5 font-bold w-[30%] text-left">藥物名稱 (因子)</th>
                                <th class="px-2 py-5 text-center font-bold w-[17%]">單劑量 (mg)</th>
                                <th class="px-2 py-5 text-center font-bold w-[17%] text-blue-300">每日顆數 (Tab)</th>
                                <th class="px-2 py-5 text-center font-bold w-[18%] bg-slate-700">總劑量 (mg)</th>
                                <th class="px-2 py-5 text-center font-bold w-[18%] bg-blue-700">LEDD (mg)</th>
                            </tr>
                        </thead>
                        <tbody id="calc-body" class="text-[16px]">
                            <!-- Rows will be injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right Side: Total Card -->
            <div class="w-full lg:w-[320px] order-1 lg:order-2 sticky-card">
                <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-200 flex flex-col items-center">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-3">Total Daily LEDD</span>
                    <div class="flex items-baseline mb-8">
                        <span id="total-ledd" class="text-7xl font-black text-blue-600 mono leading-none">0</span>
                        <span class="ml-3 text-blue-600 font-bold text-2xl uppercase">mg</span>
                    </div>
                    
                    <button id="reset-btn" class="w-full py-5 bg-slate-100 hover:bg-red-50 hover:text-red-600 text-slate-600 font-black rounded-2xl transition-all border border-slate-200 hover:border-red-200 shadow-sm active:scale-95 text-lg">
                        RESET ALL
                    </button>
                    
                    <div class="mt-8 pt-8 border-t border-slate-100 w-full">
                        <p class="text-[12px] text-slate-400 text-center leading-relaxed font-semibold italic">
                            按 Tab 鍵僅在「顆數」間跳轉<br>
                            Factor 為臨床參考估算值
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const drugs = [
            { name: "Amantadine", mg: 100, factor: 1, group: 'others' },
            { name: "Rasagiline (Azilect)", mg: 1, factor: 100, group: 'others' },
            { name: "Entacapone", mg: 200, factor: 0.33, group: 'others' },
            
            // Levodopa Group
            { name: "Madopar 100/25", mg: 100, factor: 1, group: 'levodopa' },
            { name: "Madopar 200/50", mg: 200, factor: 1, group: 'levodopa' },
            { name: "Rytary (Numient)", mg: 195, factor: 0.6, group: 'levodopa' },
            
            // Ropinirole Group
            { name: "Ropinirole 0.25mg", mg: 0.25, factor: 20, group: 'ropinirole' },
            { name: "Ropinirole 2mg", mg: 2, factor: 20, group: 'ropinirole' },
            { name: "Ropinirole 4mg", mg: 4, factor: 20, group: 'ropinirole' },
            
            // Pramipexole Group
            { name: "Pramipexole 0.375mg", mg: 0.375, factor: 100, group: 'pramipexole' },
            { name: "Pramipexole 1.5mg", mg: 1.5, factor: 100, group: 'pramipexole' },
            
            // Others
            { name: "Rotigotine (Patch)", mg: 4, factor: 30, group: 'others' },
            { name: "Apomorphine", mg: 0, factor: 10, group: 'others' },
            { name: "Stalevo", mg: 0, factor: 1.33, group: 'others' }
        ];

        const tbody = document.getElementById('calc-body');
        const totalDisplay = document.getElementById('total-ledd');

        drugs.forEach((drug, i) => {
            const tr = document.createElement('tr');
            tr.className = `border-b border-slate-100 group-${drug.group}`;
            
            tr.innerHTML = `
                <td class="px-4 py-4 font-bold text-slate-800">
                    <div class="flex items-center flex-wrap gap-1">
                        <span>${drug.name}</span>
                        <span class="text-[11px] text-slate-400 font-normal whitespace-nowrap"> (x${drug.factor})</span>
                    </div>
                </td>
                <td class="px-2 py-4">
                    <input type="number" step="any" value="${drug.mg || ''}" 
                           class="input-cell mg-input mono text-[18px]" placeholder="0" tabindex="-1">
                </td>
                <td class="px-2 py-4">
                    <input type="number" step="any" value="" 
                           class="input-cell pill-input mono text-[18px] !border-blue-200 focus:!border-blue-500" placeholder="0">
                </td>
                <td class="px-2 py-4 text-center font-bold mono text-slate-500 bg-slate-50/50">
                    <span class="total-mg text-[18px]">0</span>
                </td>
                <td class="px-2 py-4 text-center font-black mono text-blue-700 bg-blue-600/5">
                    <span class="ledd-sub text-[18px]">0</span>
                </td>
            `;
            
            tr.dataset.factor = drug.factor;
            tbody.appendChild(tr);
        });

        function calculate() {
            let grandTotal = 0;
            const rows = tbody.querySelectorAll('tr');

            rows.forEach(row => {
                const mg = parseFloat(row.querySelector('.mg-input').value) || 0;
                const pills = parseFloat(row.querySelector('.pill-input').value) || 0;
                const factor = parseFloat(row.dataset.factor);

                const totalMg = mg * pills;
                const ledd = totalMg * factor;

                row.querySelector('.total-mg').innerText = totalMg === 0 ? "0" : (Math.round(totalMg * 100) / 100);
                row.querySelector('.ledd-sub').innerText = ledd === 0 ? "0" : (Math.round(ledd * 100) / 100);

                grandTotal += ledd;
            });

            totalDisplay.innerText = Math.round(grandTotal);
        }

        tbody.addEventListener('input', (e) => {
            if (e.target.classList.contains('input-cell')) {
                calculate();
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            tbody.querySelectorAll('.mg-input').forEach((input, i) => {
                input.value = drugs[i].mg || '';
            });
            tbody.querySelectorAll('.pill-input').forEach(input => {
                input.value = '';
            });
            calculate();
        });

        calculate();
    </script>
</body>
</html>
