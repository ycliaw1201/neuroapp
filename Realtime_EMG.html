<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業報告與文獻管理系統</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Docx Preview Dependencies -->
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/docx-preview/dist/docx-preview.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        .docx-render-target { 
            min-height: 100%; 
            font-family: 'Times New Roman', serif; 
        }
        
        .docx-render-target table { 
            border-collapse: collapse !important; 
            width: 100% !important; 
            margin-bottom: 0.8em !important; 
            font-size: 11.5px !important; 
            line-height: 1.4; 
        }
        
        .docx-render-target td, .docx-render-target th { 
            border: 1.2px solid #555 !important; 
            padding: 4px 6px !important; 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* docx-preview wrapper overrides */
        .docx-wrapper { padding: 30px !important; background: white !important; }
        .docx { box-shadow: none !important; margin: 0 auto !important; width: 100% !important; max-width: 800px; }

        .collapsed-list { max-height: 0; opacity: 0; margin-bottom: 0; overflow: hidden; pointer-events: none; }
        .expanded-preview { flex: 1 !important; }
    </style>
</head>
<body class="bg-slate-200 overflow-hidden">

    <div class="flex h-screen w-full">
        <!-- 隱藏的資料夾輸入 -->
        <input type="file" id="folderInput" class="hidden" webkitdirectory mozdirectory directory>

        <!-- 左側：報告系統嵌入 -->
        <div class="flex-1 flex flex-col bg-white shadow-2xl z-30 relative border-r border-slate-300">
            <div class="h-10 bg-slate-900 text-white flex items-center justify-between px-4 shrink-0">
                <div class="flex items-center gap-2 overflow-hidden">
                    <i data-lucide="external-link" class="text-blue-400 w-4 h-4"></i>
                    <span class="text-[11px] font-bold truncate opacity-70 uppercase tracking-widest">
                        EMG/NCS System Viewer
                    </span>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="refreshIframe()" class="p-1 hover:bg-white/10 rounded transition-colors text-slate-400">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                    <a href="https://ycliaw1201.github.io/neuroapp/Form_EMGNCS.html" target="_blank" class="text-[10px] bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded font-bold transition-all text-white">
                        NEW TAB
                    </a>
                </div>
            </div>
            <iframe id="reportIframe" src="https://ycliaw1201.github.io/neuroapp/Form_EMGNCS.html" class="flex-1 w-full border-none bg-slate-50"></iframe>
        </div>

        <!-- 右側：文獻瀏覽器 (寬度 550px) -->
        <div id="sidebar" class="w-[550px] flex flex-col bg-slate-50 shrink-0 shadow-[-10px_0_40px_rgba(0,0,0,0.1)] z-20 border-l border-slate-300 transition-all duration-300">
            <div class="p-4 h-full flex flex-col">
                
                <!-- 標題與功能按鈕 -->
                <div class="flex items-center justify-between mb-3 px-1">
                    <h2 class="text-base font-black text-slate-800 flex items-center gap-2">
                        <i data-lucide="book-open" class="text-indigo-600 w-5 h-5"></i>
                        本地文獻庫
                    </h2>
                    <button id="toggleCollapseBtn" onclick="toggleCollapse()" class="flex items-center gap-2 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-xs font-bold text-white transition-all shadow-md">
                        <i data-lucide="maximize-2" id="toggleIcon" class="w-4 h-4"></i>
                        <span id="toggleText">完整預覽模式</span>
                    </button>
                </div>

                <!-- 可收合：路徑設定區 -->
                <div id="collapsibleSection" class="transition-all duration-300 mb-4">
                    <div class="bg-white border border-slate-300 rounded-xl p-4 shadow-sm mb-4">
                        <div class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-tighter">當前工作資料夾</div>
                        <div class="flex items-center gap-2 mb-3">
                            <div id="pathDisplay" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-[11px] text-slate-600 font-mono truncate">
                                未選取資料夾
                            </div>
                            <button onclick="document.getElementById('folderInput').click()" class="bg-slate-800 hover:bg-black text-white p-2.5 rounded-lg shadow-lg">
                                <i data-lucide="folder-open" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <button onclick="document.getElementById('folderInput').click()" class="w-full py-2 bg-indigo-50 border border-indigo-100 text-indigo-700 text-[11px] font-black rounded-lg hover:bg-indigo-100 transition-all uppercase tracking-widest">
                            開啟參考資料夾
                        </button>
                    </div>
                    
                    <div class="relative px-1">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="快速過濾檔案名稱..." class="w-full bg-white border border-slate-300 rounded-xl py-2.5 pl-10 pr-4 text-xs outline-none focus:ring-2 focus:ring-indigo-500/20 shadow-sm">
                    </div>
                </div>

                <!-- 檔案清單 -->
                <div id="fileListContainer" class="flex-1 overflow-y-auto space-y-1.5 mb-4 pr-1 custom-scrollbar min-h-[150px] px-1">
                    <div class="text-[10px] font-bold text-slate-500 uppercase mb-2 flex justify-between items-center bg-slate-100/50 py-1 px-2 rounded">
                        <span>檔案清單 (<span id="fileCount">0</span>)</span>
                        <div id="loader" class="hidden"><i data-lucide="loader-2" class="w-3 h-3 animate-spin text-indigo-600"></i></div>
                    </div>
                    <div id="fileList" class="space-y-1.5">
                        <div class="text-center py-12 opacity-30 bg-white rounded-2xl border border-dashed border-slate-300">
                            <i data-lucide="file-text" class="mx-auto mb-2 text-slate-400 w-8 h-8"></i>
                            <p class="text-[11px] font-bold">請先點選上方按鈕選取資料夾</p>
                        </div>
                    </div>
                </div>

                <!-- 預覽區域 -->
                <div id="previewPane" class="flex flex-col border-t border-slate-300 pt-4 transition-all duration-300 min-h-0 h-[600px] shrink-0">
                    <div class="flex items-center justify-between mb-3 px-1">
                        <div class="flex flex-col">
                            <span id="previewLabel" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">📄 文件預覽</span>
                            <span id="currentFileName" class="text-[12px] font-black text-indigo-900 truncate max-w-[400px] mt-0.5">尚未選擇檔案</span>
                        </div>
                        <div id="typeBadge" class="hidden items-center gap-2 bg-white px-2 py-1 rounded-full border border-slate-200 shadow-sm">
                           <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                           <span id="fileTypeTag" class="text-[10px] text-slate-600 font-bold uppercase">DOCX</span>
                        </div>
                    </div>
                    
                    <div class="flex-1 bg-slate-800 rounded-2xl overflow-hidden flex flex-col border border-slate-400 shadow-2xl relative">
                        <div class="bg-white m-1 rounded-xl flex-1 overflow-y-auto custom-scrollbar p-1">
                            <div id="docxPreview" class="docx-render-target"></div>
                            <div id="emptyPreview" class="h-full flex flex-col items-center justify-center text-slate-400 italic text-xs gap-3">
                                <i data-lucide="book-open" class="opacity-10 w-8 h-8"></i>
                                請從上方清單選取文件
                            </div>
                        </div>
                        
                        <!-- 收合模式下的浮動按鈕 -->
                        <button id="floatingBackBtn" onclick="toggleCollapse()" class="hidden absolute bottom-6 right-6 p-3.5 bg-indigo-600 text-white rounded-full shadow-2xl hover:bg-indigo-700 hover:scale-110 transition-all z-10 border-2 border-white">
                            <i data-lucide="minimize-2" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        // 狀態變數
        let allFiles = [];
        let selectedDocId = null;
        let isListCollapsed = false;

        // 重新整理 Iframe
        function refreshIframe() {
            const iframe = document.getElementById('reportIframe');
            iframe.src = iframe.src;
        }

        // 切換收合狀態
        function toggleCollapse() {
            isListCollapsed = !isListCollapsed;
            const collapsible = document.getElementById('collapsibleSection');
            const fileListContainer = document.getElementById('fileListContainer');
            const previewPane = document.getElementById('previewPane');
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleText = document.getElementById('toggleText');
            const previewLabel = document.getElementById('previewLabel');
            const floatingBackBtn = document.getElementById('floatingBackBtn');

            if (isListCollapsed) {
                collapsible.classList.add('collapsed-list');
                fileListContainer.classList.add('hidden');
                previewPane.classList.replace('h-[600px]', 'flex-1');
                previewPane.classList.remove('shrink-0');
                toggleIcon.setAttribute('data-lucide', 'layout-list');
                toggleText.innerText = '顯示清單';
                previewLabel.innerText = '📖 完整閱讀模式';
                floatingBackBtn.classList.remove('hidden');
            } else {
                collapsible.classList.remove('collapsed-list');
                fileListContainer.classList.remove('hidden');
                previewPane.classList.replace('flex-1', 'h-[600px]');
                previewPane.classList.add('shrink-0');
                toggleIcon.setAttribute('data-lucide', 'maximize-2');
                toggleText.innerText = '完整預覽模式';
                previewLabel.innerText = '📄 文件預覽';
                floatingBackBtn.classList.add('hidden');
            }
            lucide.createIcons();
        }

        // 處理資料夾選取
        document.getElementById('folderInput').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            document.getElementById('loader').classList.remove('hidden');
            const newDocs = [];
            const folderName = files[0].webkitRelativePath.split('/')[0];
            document.getElementById('pathDisplay').innerText = `Local://${folderName}/`;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const isDocx = file.name.endsWith('.docx');
                const isTxt = file.name.endsWith('.txt');

                if (isDocx || isTxt) {
                    const arrayBuffer = await file.arrayBuffer();
                    newDocs.push({
                        id: Date.now() + '-' + i,
                        title: file.name,
                        date: new Date(file.lastModified).toISOString().split('T')[0],
                        size: (file.size / 1024).toFixed(1) + " KB",
                        type: isDocx ? 'docx' : 'text',
                        data: arrayBuffer,
                        content: isDocx ? "" : await file.text()
                    });
                }
            }

            allFiles = newDocs;
            document.getElementById('loader').classList.add('hidden');
            renderFileList(allFiles);
            if (allFiles.length > 0) selectFile(allFiles[0].id);
        });

        // 渲染檔案清單
        function renderFileList(files) {
            const list = document.getElementById('fileList');
            const count = document.getElementById('fileCount');
            count.innerText = files.length;

            if (files.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 opacity-30 bg-white rounded-2xl border border-dashed border-slate-300">
                        <i data-lucide="file-text" class="mx-auto mb-2 text-slate-400 w-8 h-8"></i>
                        <p class="text-[11px] font-bold">無匹配檔案</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            list.innerHTML = files.map(file => `
                <div onclick="selectFile('${file.id}')" class="group flex items-center p-3 rounded-xl cursor-pointer transition-all border shadow-sm ${selectedDocId === file.id ? 'bg-indigo-50 border-indigo-300 ring-1 ring-indigo-200' : 'bg-white hover:bg-slate-50 border-slate-200 text-slate-600'}">
                    <div class="p-2 rounded-lg mr-3 ${selectedDocId === file.id ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}">
                        <i data-lucide="${file.type === 'docx' ? 'file-text' : 'file'}" class="w-4 h-4"></i>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="text-[13px] font-bold truncate ${selectedDocId === file.id ? 'text-indigo-900' : 'text-slate-700'}">${file.title}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5 flex items-center gap-2">
                            <span class="font-mono">${file.size}</span>
                            <span>•</span>
                            <span>${file.date}</span>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 ${selectedDocId === file.id ? 'text-indigo-400' : 'text-slate-300'}"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 搜尋功能
        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allFiles.filter(f => f.title.toLowerCase().includes(term));
            renderFileList(filtered);
        }

        // 選取並預覽檔案
        async function selectFile(id) {
            selectedDocId = id;
            const file = allFiles.find(f => f.id === id);
            if (!file) return;

            // 更新 UI 狀態
            renderFileList(allFiles.filter(f => f.title.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase())));
            document.getElementById('currentFileName').innerText = file.title;
            document.getElementById('emptyPreview').classList.add('hidden');
            document.getElementById('typeBadge').classList.replace('hidden', 'flex');
            document.getElementById('fileTypeTag').innerText = file.type;

            const container = document.getElementById('docxPreview');
            container.innerHTML = "";

            if (file.type === 'docx') {
                try {
                    await docx.renderAsync(file.data, container, null, {
                        className: "docx",
                        inWrapper: false
                    });
                } catch (e) {
                    container.innerHTML = `<div class="p-10 text-slate-400 text-center italic">解析失敗：格式不相容</div>`;
                }
            } else {
                const pre = document.createElement('pre');
                pre.style.cssText = "font-family: inherit; white-space: pre-wrap; color: #475569; padding: 20px; font-size: 13px;";
                pre.textContent = file.content;
                container.appendChild(pre);
            }
        }
    </script>
</body>
</html>
