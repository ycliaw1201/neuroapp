<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頭痛日記 & 藥物使用紀錄表</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 列印相關的全局 CSS */
        @media print {
            @page {
                size: A4 landscape;
                margin: 4mm;
            }
            body {
                background: white !important;
                padding: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .print\:hidden { display: none !important; }
            
            /* 確保每頁都強制分頁，但最後一頁不加空白頁 */
            .page-wrapper {
                page-break-after: always;
                break-after: page;
                height: 100vh;
                max-height: 202mm; /* A4 width 210mm - margin */
            }
            #print-container > .page-wrapper:last-child {
                page-break-after: auto;
                break-after: auto;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans print:bg-white text-gray-900">

<div class="min-h-screen p-4 print:p-0" id="app-container">
    
    <!-- ================= 設定面板 ================= -->
    <div id="config-panel" class="max-w-6xl mx-auto bg-white rounded-xl shadow-xl p-6 mb-8 print:hidden border border-blue-100 transition-all">
        <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <i data-lucide="settings" class="w-6 h-6 text-blue-600"></i>
                頭痛衛教單張設定
            </h2>
            <div class="flex gap-4">
                <button onclick="handleReset()" class="text-gray-500 hover:text-red-600 flex items-center gap-1 text-sm font-medium transition-colors">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重設
                </button>
                <button onclick="toggleConfig(false)" class="text-blue-600 hover:text-blue-800 underline text-sm font-medium">
                    隱藏設定預覽
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側：基本設定 -->
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-gray-50/50 p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <i data-lucide="calendar" class="w-4 h-4 text-gray-500"></i> 基本選項
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">醫師姓名</label>
                            <input type="text" id="input-doctor-name" value="廖誼佳" class="w-full border-gray-300 border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">起始日期</label>
                            <input type="date" id="input-start-date" class="w-full border-gray-300 border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">總週數</label>
                            <select id="input-days-count" class="w-full border-gray-300 border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-white">
                                <option value="14">2 週 (14天)</option>
                                <option value="28">4 週 (28天)</option>
                                <option value="56">8 週 (56天)</option>
                                <option value="84">12 週 (84天)</option>
                            </select>
                            <p class="text-[10px] text-gray-500 mt-1">*每28天將自動分一頁列印</p>
                        </div>
                        <div class="bg-purple-50 p-3 rounded-lg border border-purple-100 mt-4">
                            <label class="flex items-start gap-2 cursor-pointer">
                                <input type="checkbox" id="input-titration" class="w-4 h-4 text-purple-600 rounded mt-0.5" />
                                <div class="flex-1">
                                    <span class="text-sm font-bold text-purple-900 block leading-none mb-1">啟用「適應期」標記</span>
                                    <span class="text-[10px] text-purple-700 leading-tight block">特定藥物前三天標示夜用</span>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：藥物選擇區 -->
            <div class="lg:col-span-9 space-y-6">
                <!-- 急性用藥 -->
                <div>
                    <label class="flex items-center gap-2 text-sm font-bold text-green-800 mb-3 bg-green-50 px-3 py-1.5 rounded-md w-fit">
                        <i data-lucide="activity" class="w-4 h-4"></i> 急性止痛藥物 (需要時服用)
                    </label>
                    <div id="acute-meds-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2"></div>
                </div>

                <!-- 預防性用藥 -->
                <div>
                    <label class="flex items-center gap-2 text-sm font-bold text-purple-800 mb-3 bg-purple-50 px-3 py-1.5 rounded-md w-fit">
                        <i data-lucide="moon" class="w-4 h-4"></i> 預防性用藥 (每日規律服用)
                    </label>
                    <div id="preventive-meds-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2"></div>
                </div>

                <!-- 其他治療 -->
                <div>
                    <label class="flex items-center gap-2 text-sm font-bold text-blue-800 mb-3 bg-blue-50 px-3 py-1.5 rounded-md w-fit">
                        <i data-lucide="syringe" class="w-4 h-4"></i> 其他治療 (注射 / 非口服)
                    </label>
                    <div id="other-meds-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2"></div>
                </div>
            </div>
        </div>

        <div class="mt-8 flex justify-end border-t border-gray-100 pt-6">
            <button onclick="handlePrint()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-lg flex items-center gap-2 shadow-md hover:shadow-lg transition-all font-bold text-lg">
                <i data-lucide="file-down" class="w-5 h-5"></i> 輸出 PDF / 列印
            </button>
        </div>
    </div>

    <!-- 列印確認浮動列 (預覽模式顯示) -->
    <div id="floating-bar" class="hidden print:hidden fixed top-4 right-4 bg-white shadow-xl border border-gray-200 rounded-lg p-3 flex gap-3 z-50 transition-all">
        <button onclick="toggleConfig(true)" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-md text-gray-700 font-medium transition-colors">返回設定</button>
        <button onclick="handlePrint()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium shadow-sm transition-colors flex items-center gap-2">
            <i data-lucide="printer" class="w-4 h-4"></i> 確認列印
        </button>
    </div>

    <!-- ================= 列印區域 ================= -->
    <div id="print-container" class="print-container"></div>

</div>

<script>
    // === 藥物資料庫 ===
    const ACUTE_MEDS_DB = [
        { id: 'cataflam', name: 'Cataflam (克他服寧 25mg)', color: 'bg-red-400', shape: 'rounded-full', desc: '圓凸形/淡紅色', warning: '注意腸胃道副作用' },
        { id: 'celebrex', name: 'Celebrex (希樂葆 200mg)', color: 'bg-white border-2 border-yellow-500', shape: 'rounded-md', desc: '長圓柱形/白色與金色', warning: '注意腸胃道副作用' },
        { id: 'ecoxia', name: 'Ecoxia (易克適 60mg)', color: 'bg-teal-100', shape: 'rounded-md', desc: '鈍三角形/淺灰綠色', warning: '注意腸胃道副作用' },
        { id: 'naton', name: 'Naton SR (拿痛長效 750mg)', color: 'bg-orange-400', shape: 'rounded-md', desc: '長圓柱形/橘色', warning: '注意腸胃道副作用' },
        { id: 'voren', name: 'Voren (非炎 50mg)', color: 'bg-gradient-to-r from-red-500 to-white border border-red-200', shape: 'rounded-md', desc: '長圓柱形/紅白色', warning: '注意腸胃道副作用' },
        { id: 'acetal', name: 'Acetal (愛舒疼 500mg)', color: 'bg-yellow-300', shape: 'rounded-md', desc: '長圓柱形/黃色' },
        { id: 'imigran', name: 'Imigran FDT (英明格 50mg)', color: 'bg-pink-300', shape: 'rounded-md', desc: '三角形/粉紅色' },
        { id: 'lesiton', name: 'Lesiton (樂息痛 5mg)', color: 'bg-orange-200 opacity-80', shape: 'rounded-md', desc: '長圓柱形/透明橘色' },
        { id: 'indomesa', name: 'Indomesa (抑僂寧 25mg)', color: 'bg-gradient-to-r from-green-500 to-white border border-green-200', shape: 'rounded-md', desc: '長圓柱形/綠白色', warning: '注意腸胃道副作用，若有胃部疼痛，則搭配胃藥，注意大便是否有變黑變紅的情形' },
        { id: 'self_prep', name: '自備止痛藥', color: 'bg-gray-100 border border-dashed border-gray-500', shape: 'rounded-full', desc: '自行備用' },
    ];

    const PREVENTIVE_MEDS_DB = [
        { id: 'topamax', name: 'TOPAmax (妥泰 25mg)', color: 'bg-white border-2 border-gray-300', shape: 'rounded-full', desc: '圓扁形/白色/刻痕', allowTitration: true, warning: '注意肢端麻木、認知障礙與體重減輕等副作用。若有肢端麻木腎功能好者可以多吃香蕉補充鉀離子。' },
        { id: 'topaless', name: 'Topaless (癲除 100mg)', color: 'bg-yellow-100', shape: 'rounded-full', desc: '圓形/淡黃色', allowTitration: true, warning: '注意肢端麻木、認知障礙與體重減輕等副作用。若有肢端麻木腎功能好者可以多吃香蕉補充鉀離子。' },
        { id: 'depakine200', name: 'Depakine GR (帝拔癲腸溶 200mg)', color: 'bg-white border-2 border-gray-300', shape: 'rounded-full', desc: '圓扁形/白色', allowTitration: false, warning: '注意肝功能，水腫、肥胖、掉髮等副作用' },
        { id: 'depakine500', name: 'Depakine Chrono (帝拔癲長效 500mg)', color: 'bg-white border-2 border-gray-300', shape: 'rounded-full', desc: '橢圓形/白色', allowTitration: false, warning: '注意肝功能，水腫、肥胖、掉髮等副作用' },
        { id: 'blopress', name: 'Blopress (博脈舒 8mg)', color: 'bg-pink-100', shape: 'rounded-full', desc: '圓形/淺粉紅色', allowTitration: false, warning: '注意血壓低的副作用' },
        { id: 'cardolol', name: 'CARdolol (心康樂 40mg)', color: 'bg-pink-300', shape: 'rounded-full', desc: '圓形/粉紅色', allowTitration: false, warning: '注意若心跳 < 60 或出現氣喘則停用並就醫' },
        { id: 'propranolol', name: 'Propranolol (心律錠 10mg)', color: 'bg-red-400', shape: 'rounded-full', desc: '圓扁形/紅色', allowTitration: false, warning: '注意若心跳 < 60 或出現氣喘則停用並就醫' },
        { id: 'concor5', name: 'Concor-5 (康肯 5mg)', color: 'bg-yellow-100', shape: 'rounded-md', desc: '心形/淡黃色', allowTitration: false, warning: '注意若心跳 < 60 或出現氣喘則停用並就醫' },
        { id: 'concor1', name: 'Concor (康肯 1.25mg)', color: 'bg-white border border-gray-300', shape: 'rounded-full', desc: '圓凸形/白色', allowTitration: false, warning: '注意若心跳 < 60 或出現氣喘則停用並就醫' },
        { id: 'fluzine', name: 'Fluzine (服腦清 5mg)', color: 'bg-yellow-100', shape: 'rounded-full', desc: '圓扁形/淡黃色', allowTitration: true, warning: '可能產生嗜睡的副作用' },
        { id: 'effexor', name: 'Effexor XR (速悅 37.5mg)', color: 'bg-gradient-to-r from-gray-400 to-pink-300', shape: 'rounded-md', desc: '圓柱形/灰粉紅色', allowTitration: false, warning: '可能產生噁心嘔吐的副作用' },
        { id: 'trynol', name: 'Trynol (德利能 25mg)', color: 'bg-blue-200', shape: 'rounded-full', desc: '扁圓形/淡藍色', allowTitration: false, warning: '若有眼睛疼痛疑似青光眼或排尿困難、嗜睡、無力，則停用並回診。' },
        { id: 'fronil', name: 'FROnil (福樂你 25mg)', color: 'bg-pink-200', shape: 'rounded-full', desc: '圓凸形/淺粉紅色', allowTitration: false, warning: '可能產生嗜睡的副作用' },
        { id: 'cypromin', name: 'Cypromin (希普利敏液)', color: 'bg-blue-50 border border-blue-200', shape: 'rounded-sm', desc: '透明無色液體', allowTitration: false },
        { id: 'isoptin', name: 'Isoptin SR (心舒平 240mg)', color: 'bg-teal-200', shape: 'rounded-md', desc: '長圓柱形/淡青色', allowTitration: false, warning: '需注意房室阻斷或心跳過慢等副作用' },
        { id: 'lidin', name: 'Lidin (立定 300mg)', color: 'bg-white border border-gray-300', shape: 'rounded-full', desc: '圓形/白色', allowTitration: false, warning: '注意無力、噁心顫抖、視力模糊、白血球增加、神智不清、步態不穩、眼震、外椎體路徑症狀、癲癇等' },
        { id: 'prednisolone', name: 'Prednisolone (普列道寧 5mg)', color: 'bg-pink-100', shape: 'rounded-full', desc: '圓扁形/淡粉紅色', allowTitration: false, warning: '注意腸胃道副作用' },
    ];

    const OTHER_MEDS_DB = [
        { id: 'emgality', name: 'Emgality (恩疼停 120mg)', color: 'bg-gray-100 border border-gray-400', shape: 'rounded-sm', desc: '預先充填注射筆' },
        { id: 'botox', name: 'Botox (保妥適 100U)', color: 'bg-purple-100 border border-purple-400', shape: 'rounded-sm', desc: '乾粉注射劑' },
        { id: 'oxygen', name: '純氧 (非再吸式面罩)', color: 'bg-blue-100 border border-blue-400', shape: 'rounded-sm', desc: '氣體面罩' },
    ];

    // === 狀態管理 ===
    let state = {
        daysCount: 28, // 預設 4 週
        startDate: new Date().toISOString().split('T')[0],
        doctorName: '廖誼佳',
        selectedAcuteMeds: ['cataflam'],
        selectedPreventiveMeds: ['topamax'],
        selectedOtherMeds: [],
        enableTitration: true,
        isConfigOpen: true
    };

    // DOM 元素
    const elStartDate = document.getElementById('input-start-date');
    const elDaysCount = document.getElementById('input-days-count');
    const elTitration = document.getElementById('input-titration');
    const elDoctorName = document.getElementById('input-doctor-name');
    
    // 初始化事件監聽
    elStartDate.addEventListener('change', (e) => { state.startDate = e.target.value; updateApp(); });
    elDaysCount.addEventListener('change', (e) => { state.daysCount = Number(e.target.value); updateApp(); });
    elTitration.addEventListener('change', (e) => { state.enableTitration = e.target.checked; updateApp(); });
    elDoctorName.addEventListener('input', (e) => { state.doctorName = e.target.value; updateApp(); });

    // === 核心邏輯 ===
    
    // 切換藥物選取狀態
    function toggleMed(id, listName) {
        if (state[listName].includes(id)) {
            state[listName] = state[listName].filter(x => x !== id);
        } else {
            state[listName].push(id);
        }
        updateApp();
    }

    // 重設設定
    function handleReset() {
        state.daysCount = 28;
        state.startDate = new Date().toISOString().split('T')[0];
        state.doctorName = '廖誼佳';
        state.selectedAcuteMeds = [];
        state.selectedPreventiveMeds = [];
        state.selectedOtherMeds = [];
        state.enableTitration = true;
        
        // 更新 Input DOM
        elStartDate.value = state.startDate;
        elDaysCount.value = state.daysCount;
        elTitration.checked = state.enableTitration;
        elDoctorName.value = state.doctorName;
        
        updateApp();
    }

    // 切換設定面板與列印浮動條的顯示
    function toggleConfig(isOpen) {
        state.isConfigOpen = isOpen;
        const panel = document.getElementById('config-panel');
        const bar = document.getElementById('floating-bar');
        
        if (isOpen) {
            panel.classList.remove('hidden');
            bar.classList.add('hidden');
        } else {
            panel.classList.add('hidden');
            bar.classList.remove('hidden');
        }
    }

    // 執行列印
    function handlePrint() {
        toggleConfig(false);
        setTimeout(() => { window.print(); }, 150);
    }

    // 產生分頁日期資料
    function generateChunkedDates() {
        const dates = [];
        const start = new Date(state.startDate);
        for (let i = 0; i < state.daysCount; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            dates.push({
                dayNum: i + 1,
                dateStr: `${d.getMonth() + 1}/${d.getDate()}`
            });
        }

        const chunks = [];
        for (let i = 0; i < dates.length; i += 28) {
            chunks.push(dates.slice(i, i + 28));
        }
        return chunks;
    }

    // === 渲染函數 ===

    // 渲染藥物選擇卡片
    function renderMedCards() {
        const createCardHTML = (med, selected, type, listName) => {
            const typeStyles = {
                acute: selected ? 'border-green-500 bg-green-50 text-green-900 ring-1 ring-green-500' : 'border-gray-200 hover:border-green-300',
                preventive: selected ? 'border-purple-500 bg-purple-50 text-purple-900 ring-1 ring-purple-500' : 'border-gray-200 hover:border-purple-300',
                other: selected ? 'border-blue-500 bg-blue-50 text-blue-900 ring-1 ring-blue-500' : 'border-gray-200 hover:border-blue-300',
            };
            const iconColor = type === 'acute' ? 'text-green-600' : (type === 'preventive' ? 'text-purple-600' : 'text-blue-600');
            const checkIcon = selected ? `<i data-lucide="check-circle-2" class="w-4 h-4 ml-2 flex-shrink-0 ${iconColor}"></i>` : '';

            return `
                <div onclick="toggleMed('${med.id}', '${listName}')" class="relative flex items-center p-2 rounded-lg border cursor-pointer transition-all duration-200 ${typeStyles[type]} bg-white">
                    <div class="flex-1 flex flex-col">
                        <span class="text-xs font-bold leading-tight">${med.name}</span>
                        <span class="text-[10px] text-gray-500 mt-0.5 truncate">${med.desc}</span>
                    </div>
                    ${checkIcon}
                </div>
            `;
        };

        document.getElementById('acute-meds-container').innerHTML = ACUTE_MEDS_DB.map(med => 
            createCardHTML(med, state.selectedAcuteMeds.includes(med.id), 'acute', 'selectedAcuteMeds')
        ).join('');

        document.getElementById('preventive-meds-container').innerHTML = PREVENTIVE_MEDS_DB.map(med => 
            createCardHTML(med, state.selectedPreventiveMeds.includes(med.id), 'preventive', 'selectedPreventiveMeds')
        ).join('');

        document.getElementById('other-meds-container').innerHTML = OTHER_MEDS_DB.map(med => 
            createCardHTML(med, state.selectedOtherMeds.includes(med.id), 'other', 'selectedOtherMeds')
        ).join('');
    }

    // 產生空白 TD 網格
    function generateEmptyCells(chunkCount) {
        return Array(chunkCount).fill('<td class="border border-gray-400"></td>').join('');
    }

    // 渲染列印區塊
    function renderPrintContainer() {
        const chunkedDates = generateChunkedDates();
        const totalPages = chunkedDates.length + 1;
        
        const activeAcuteMeds = ACUTE_MEDS_DB.filter(m => state.selectedAcuteMeds.includes(m.id));
        const activePreventiveMeds = PREVENTIVE_MEDS_DB.filter(m => state.selectedPreventiveMeds.includes(m.id));
        const activeOtherMeds = OTHER_MEDS_DB.filter(m => state.selectedOtherMeds.includes(m.id));

        let html = '';

        // 日曆分頁
        chunkedDates.forEach((chunk, pageIndex) => {
            const chunkLen = chunk.length;
            
            // 表頭日期 TD
            const dayNumHTML = chunk.map(d => `<th class="border border-gray-600 text-center bg-gray-50 text-xs w-[25px]">${d.dayNum}</th>`).join('');
            const dateStrHTML = chunk.map(d => `<th class="border border-gray-600 text-center text-[10px] font-normal tracking-tighter">${d.dateStr}</th>`).join('');
            
            // 藥物紀錄 TD
            const acuteRows = activeAcuteMeds.length > 0 
                ? activeAcuteMeds.map(med => `
                    <tr>
                        <td class="border border-gray-600 p-1 text-[10px] leading-tight whitespace-nowrap">${med.name}</td>
                        ${generateEmptyCells(chunkLen)}
                    </tr>
                `).join('')
                : `<tr><td class="border border-gray-600 p-1 text-[10px] text-gray-400 whitespace-nowrap">未選用</td>${generateEmptyCells(chunkLen)}</tr>`;

            const prevRows = activePreventiveMeds.length > 0 
                ? activePreventiveMeds.map(med => {
                    const cells = chunk.map(d => {
                        const globalIndex = d.dayNum - 1;
                        const isTitrationCell = state.enableTitration && med.allowTitration && globalIndex < 3;
                        return `<td class="border border-gray-400 text-center relative h-[24px]">
                                    ${isTitrationCell ? '<span class="text-[9px] text-gray-400 font-bold block leading-none transform scale-[0.85]">夜用</span>' : ''}
                                </td>`;
                    }).join('');
                    
                    return `
                    <tr>
                        <td class="border border-gray-600 p-1 text-[10px] leading-tight whitespace-nowrap relative pr-8">
                            ${med.name}
                        </td>
                        ${cells}
                    </tr>`;
                }).join('')
                : `<tr><td class="border border-gray-600 p-1 text-[10px] text-gray-400 whitespace-nowrap">未選用</td>${generateEmptyCells(chunkLen)}</tr>`;

            const otherRows = activeOtherMeds.length > 0 
                ? `<tr><td class="border border-gray-800 p-1 font-bold bg-blue-50 text-[11px]" colspan="${chunkLen + 1}">其他治療 (紀錄或打勾)</td></tr>` +
                  activeOtherMeds.map(med => `
                    <tr>
                        <td class="border border-gray-600 p-1 text-[10px] leading-tight whitespace-nowrap">${med.name}</td>
                        ${generateEmptyCells(chunkLen)}
                    </tr>
                `).join('')
                : '';

            html += `
            <div class="page-wrapper mx-auto bg-white max-w-[297mm] overflow-hidden flex flex-col pt-2 pb-2">
                <div class="border-b-2 border-gray-800 pb-1 mb-1.5 flex justify-between items-end px-1">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900 tracking-wide">頭痛日記 & 藥物使用紀錄表 <span class="text-sm font-normal text-gray-500 ml-2">(第 ${pageIndex + 1} 頁 / 共 ${totalPages} 頁)</span></h1>
                        <p class="text-sm text-gray-700 mt-1 font-medium">姓名: __________________ &nbsp;&nbsp; 病歷號: __________________ &nbsp;&nbsp; 醫師: <span class="font-bold border-b border-gray-500 px-2">${state.doctorName || '　　　'}</span></p>
                    </div>
                    <div class="text-right text-xs text-gray-600 font-medium bg-gray-50 px-2 py-1 rounded border border-gray-200">
                        請每日睡前記錄，就診時請務必攜帶此表。
                    </div>
                </div>

                <div class="flex flex-grow mt-1 px-1">
                    <div class="flex-grow">
                        <table class="w-full border-collapse border border-gray-800 text-sm">
                            <thead>
                                <tr>
                                    <th class="border border-gray-800 bg-gray-100 w-auto whitespace-nowrap p-1 text-left text-xs">項次 / 天數</th>
                                    ${dayNumHTML}
                                </tr>
                                <tr>
                                    <th class="border border-gray-800 bg-gray-100 p-1 text-left text-[11px] whitespace-nowrap">日期</th>
                                    ${dateStrHTML}
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="border border-gray-800 p-1 font-bold bg-red-50 text-[11px]" colspan="${chunkLen + 1}">
                                        疼痛程度 <span class="font-normal text-gray-600 ml-1 text-[10px]">(1:輕微不影響 / 2:中度影響專注 / 3:嚴重需臥床)</span>
                                    </td>
                                </tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] text-center font-bold whitespace-nowrap">早上</td>${generateEmptyCells(chunkLen)}</tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] text-center font-bold whitespace-nowrap">中午</td>${generateEmptyCells(chunkLen)}</tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] text-center font-bold whitespace-nowrap">晚上</td>${generateEmptyCells(chunkLen)}</tr>

                                <tr><td class="border border-gray-800 p-1 font-bold bg-yellow-50 text-[11px]" colspan="${chunkLen + 1}">伴隨症狀 (有則打勾)</td></tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] whitespace-nowrap">噁心 / 嘔吐</td>${generateEmptyCells(chunkLen)}</tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] whitespace-nowrap">怕光 / 怕吵</td>${generateEmptyCells(chunkLen)}</tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] whitespace-nowrap">視覺預兆 <span class="text-[9px] text-gray-500 tracking-tighter">(閃光/鋸齒)</span></td>${generateEmptyCells(chunkLen)}</tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] whitespace-nowrap">頭側流眼淚 / 流鼻水</td>${generateEmptyCells(chunkLen)}</tr>

                                <tr><td class="border border-gray-800 p-1 font-bold bg-blue-50 text-[11px]" colspan="${chunkLen + 1}">持續時間</td></tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] whitespace-nowrap">超過 4 小時</td>${generateEmptyCells(chunkLen)}</tr>
                                <tr><td class="border border-gray-600 p-1 text-[11px] whitespace-nowrap">小於 4 小時</td>${generateEmptyCells(chunkLen)}</tr>

                                <tr><td class="border border-gray-800 p-1 font-bold bg-green-50 text-[11px]" colspan="${chunkLen + 1}">急性用藥 (紀錄顆數)</td></tr>
                                ${acuteRows}

                                <tr><td class="border border-gray-800 p-1 font-bold bg-purple-50 text-[11px]" colspan="${chunkLen + 1}">預防用藥 (有吃打勾)</td></tr>
                                ${prevRows}

                                ${otherRows}

                                <tr><td class="border border-gray-800 p-1 font-bold text-[11px] bg-gray-50 whitespace-nowrap">運動狀況 (分鐘)</td>${generateEmptyCells(chunkLen)}</tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        });

        // ================= 獨立衛教專頁 (版面字體放大，確保單頁) =================
        const acuteCardsHTML = activeAcuteMeds.map(med => `
            <div class="bg-white p-2.5 rounded shadow-sm border border-gray-100 break-inside-avoid">
                <div class="flex items-start gap-2">
                    <div class="w-4 h-4 shadow-sm flex-shrink-0 mt-0.5 ${med.shape} ${med.color}"></div>
                    <div class="text-xs leading-tight flex-1">
                        <div class="font-bold text-gray-800 text-sm">${med.name}</div>
                        <div class="text-gray-500 mt-0.5">${med.desc}</div>
                    </div>
                </div>
                ${med.warning ? `
                <div class="mt-1.5 text-xs text-red-700 bg-red-50 p-1.5 rounded border border-red-200 font-medium leading-snug">
                    <i data-lucide="alert-circle" class="w-3.5 h-3.5 inline mr-0.5 -mt-0.5"></i>${med.warning}
                </div>` : ''}
            </div>
        `).join('');

        const otherCardsHTML = activeOtherMeds.map(med => `
            <div class="flex items-start gap-2 bg-white p-2.5 rounded shadow-sm border border-gray-100 break-inside-avoid">
                <div class="w-5 h-5 flex items-center justify-center text-blue-500 bg-blue-100 rounded flex-shrink-0">
                    <i data-lucide="syringe" class="w-3 h-3"></i>
                </div>
                <div class="text-xs leading-tight">
                    <div class="font-bold text-gray-800 text-sm">${med.name}</div>
                    <div class="text-gray-500 mt-0.5">${med.desc}</div>
                </div>
            </div>
        `).join('');

        const prevCardsHTML = activePreventiveMeds.map(med => `
            <div class="bg-white p-2.5 rounded shadow-sm border border-gray-100 h-max break-inside-avoid">
                <div class="flex items-start gap-2">
                    <div class="w-4 h-4 shadow flex-shrink-0 mt-0.5 ${med.shape} ${med.color}"></div>
                    <div class="text-xs leading-tight flex-1">
                        <div class="font-bold text-gray-800 text-sm">${med.name}</div>
                        <div class="text-gray-500 mt-0.5">${med.desc}</div>
                    </div>
                </div>
                ${med.warning ? `
                <div class="mt-1.5 text-xs text-red-700 bg-red-50 p-1.5 rounded border border-red-200 font-medium leading-snug">
                    <i data-lucide="alert-circle" class="w-3.5 h-3.5 inline mr-0.5 -mt-0.5"></i>${med.warning}
                </div>` : ''}
            </div>
        `).join('');

        const titrationWarningHTML = (state.enableTitration && activePreventiveMeds.some(m => m.allowTitration)) ? `
            <div class="mt-3 p-3 bg-purple-100 rounded-lg border border-purple-200">
                <h4 class="font-bold text-purple-900 mb-1 flex items-center gap-1 text-sm">
                    <i data-lucide="moon" class="w-4 h-4"></i> 適應期用藥提醒
                </h4>
                <p class="text-xs text-purple-800 leading-snug">
                    紀錄表上有標示「<span class="font-bold text-gray-600 bg-white px-1 rounded">夜用</span>」的藥物，前三天請於<span class="font-bold text-red-600">睡前服用</span>，以減少初期頭暈嗜睡。適應後可遵照一般醫囑服用。
                </p>
            </div>
        ` : '';

        html += `
        <div class="page-wrapper mx-auto bg-white w-[297mm] h-[202mm] overflow-hidden flex flex-col p-4 box-border border print:border-none print:m-0">
            <div class="border-b-2 border-gray-800 pb-2 mb-3 flex justify-between items-end shrink-0">
                <h1 class="text-2xl font-bold text-gray-900 tracking-wider">藥物辨識與注意事項</h1>
                <span class="text-sm font-normal text-gray-500">(第 ${totalPages} 頁 / 共 ${totalPages} 頁)</span>
            </div>

            <!-- 使用 grid-cols-12 高度控制更靈活，overflow-hidden 防止超頁 -->
            <div class="flex-grow grid grid-cols-12 gap-4 min-h-0 overflow-hidden">
                
                <!-- 左欄：急性用藥與其他治療 (佔 3/12) -->
                <div class="col-span-3 flex flex-col gap-3 min-h-0 overflow-hidden">
                    ${activeAcuteMeds.length > 0 ? `
                    <div class="bg-green-50/30 p-3 rounded-xl border border-green-100 shrink-0">
                        <h3 class="text-sm font-bold border-b border-green-300 mb-2 text-green-800 inline-block w-full pb-1 flex items-center gap-1.5">
                            <i data-lucide="activity" class="w-4 h-4"></i> 急性止痛藥 (發作使用)
                        </h3>
                        <div class="flex flex-col gap-2 overflow-y-auto pr-1 pb-1 max-h-full">${acuteCardsHTML}</div>
                    </div>` : ''}

                    ${activeOtherMeds.length > 0 ? `
                    <div class="bg-blue-50/30 p-3 rounded-xl border border-blue-100 shrink-0">
                        <h3 class="text-sm font-bold border-b border-blue-300 mb-2 text-blue-800 inline-block w-full pb-1 flex items-center gap-1.5">
                            <i data-lucide="syringe" class="w-4 h-4"></i> 其他治療
                        </h3>
                        <div class="flex flex-col gap-2 overflow-y-auto pr-1 pb-1 max-h-full">${otherCardsHTML}</div>
                    </div>` : ''}
                </div>

                <!-- 中欄：預防性用藥 (佔 6/12，內部為雙欄) -->
                <div class="col-span-6 flex flex-col bg-purple-50/30 p-3 rounded-xl border border-purple-100 min-h-0 overflow-hidden">
                    ${activePreventiveMeds.length > 0 ? `
                    <h3 class="text-sm font-bold border-b border-purple-300 mb-2 text-purple-800 shrink-0 pb-1 flex items-center gap-1.5">
                        <i data-lucide="moon" class="w-4 h-4"></i> 預防性用藥 (每日規律使用)
                    </h3>
                    <div class="grid grid-cols-2 gap-3 overflow-y-auto content-start pr-1 pb-1">
                        ${prevCardsHTML}
                    </div>` : `
                    <h3 class="text-sm font-bold border-b border-purple-300 mb-2 text-purple-800 shrink-0 pb-1 flex items-center gap-1.5">
                        <i data-lucide="moon" class="w-4 h-4"></i> 預防性用藥
                    </h3>
                    <div class="text-sm text-gray-500">未選用任何預防性用藥</div>
                    `}
                </div>

                <!-- 右欄：通用衛教與預約 (佔 3/12) -->
                <div class="col-span-3 flex flex-col gap-4 min-h-0">
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm shrink-0">
                        <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-1.5 text-[15px] border-b border-gray-300 pb-1.5">
                            <i data-lucide="activity" class="w-4 h-4 text-blue-600"></i> 日常照護注意事項
                        </h3>
                        
                        <ul class="list-disc pl-4 space-y-2 text-xs text-gray-700 leading-snug">
                            <li><strong class="text-gray-900">勿過度依賴止痛藥：</strong>若一週需使用急性止痛藥<span class="text-red-600 font-bold underline">超過2天</span>，請與醫師討論。</li>
                            <li><strong class="text-gray-900">建立運動習慣：</strong>規律有氧運動 (每週3次，每次30分鐘) 有助於顯著改善偏頭痛。</li>
                            <li><strong class="text-gray-900">規律作息：</strong>保持充足睡眠與水分補充，避免飢餓或過度勞累。</li>
                        </ul>
                        
                        ${titrationWarningHTML}
                    </div>

                    <div class="border-2 border-gray-400 p-4 rounded-xl bg-blue-50/50 shrink-0">
                        <p class="font-bold text-gray-800 text-sm mb-3 flex items-center justify-between">
                            <span>下次預約時間：</span>
                            <span class="border-b border-gray-500 inline-block w-24"></span>
                        </p>
                        <p class="text-gray-600 text-xs leading-relaxed">
                            回診時，請務必<strong class="text-gray-900">攜帶此份紀錄表</strong>，以協助醫師評估用藥成效與後續計畫。
                        </p>
                    </div>
                </div>

            </div>
        </div>`;

        document.getElementById('print-container').innerHTML = html;
    }

    // 整合更新函式
    function updateApp() {
        // 更新 Inputs 值
        elStartDate.value = state.startDate;
        elDaysCount.value = state.daysCount;
        elTitration.checked = state.enableTitration;
        elDoctorName.value = state.doctorName;

        // 重新渲染畫面
        renderMedCards();
        renderPrintContainer();
        
        // 重新繪製 Lucide 圖示
        lucide.createIcons();
    }

    // 初始化應用
    updateApp();

</script>

</body>
</html>
