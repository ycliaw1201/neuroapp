<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神經內科初診單 - 數位填寫版</title>
    
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Tailwind CSS 用於樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* 水平捲軸專用樣式 */
        .hide-scrollbar::-webkit-scrollbar {
            height: 4px;
        }
        .hide-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 4px;
        }
        .hide-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #d1d5db;
        }
        .summary-area::-webkit-scrollbar {
            width: 6px;
        }
        .summary-area::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .summary-area::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 4px;
        }
        .summary-area::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        // ★ Hover 再升級：FormRow 支援明顯的白底浮出與陰影
        const FormRow = ({ title, children, labelClass="text-gray-700", hoverColor="group-hover:text-blue-600", className="" }) => (
            <div className={`group flex flex-col sm:flex-row sm:items-center gap-1.5 sm:gap-3 p-2 -mx-2 print:mx-0 print:p-1 border-b border-gray-100 last:border-0 hover:bg-white hover:border-transparent hover:shadow-[0_5px_15px_-3px_rgba(0,0,0,0.1)] hover:-translate-y-0.5 print:hover:shadow-none print:hover:bg-transparent print:hover:translate-y-0 rounded-xl transition-all duration-300 relative z-0 hover:z-10 ${className}`}>
                <div className="sm:w-1/4 shrink-0">
                    <label className={`text-[13px] sm:text-sm font-bold transition-colors duration-300 ${hoverColor} ${labelClass}`}>
                        {title}
                    </label>
                </div>
                <div className="w-full sm:w-3/4 flex-grow flex flex-col justify-center">
                    {children}
                </div>
            </div>
        );

        // ★ Hover 再升級：RadioCard 跳躍感更明顯
        const RadioCard = ({ name, value, checked, onChange, label }) => {
            return (
                <label 
                    className={`cursor-pointer border rounded-lg transition-all duration-300 p-1 flex-1 text-center min-w-[48px] min-h-[30px] flex items-center justify-center focus-within:ring-2 focus-within:ring-blue-500
                    ${checked 
                        ? 'bg-blue-600 border-blue-600 text-white shadow-md transform scale-[1.02]' 
                        : 'bg-white border-gray-200 hover:border-blue-500 hover:bg-blue-50 hover:text-blue-700 hover:shadow-md hover:-translate-y-1 text-gray-600'}`}
                >
                    <input type="radio" name={name} value={value} checked={checked} onChange={onChange} className="sr-only" />
                    <span className="block font-medium text-[13px] sm:text-sm">{label}</span>
                </label>
            );
        };

        // ★ Hover 再升級：CheckboxButton 跳躍感更明顯
        const CheckboxButton = ({ name, value, checked, onChange, label, className = "" }) => {
            return (
                <label 
                    className={`cursor-pointer border rounded-lg transition-all duration-300 px-1.5 py-1 flex items-center justify-center text-[13px] sm:text-sm font-medium select-none min-h-[30px] focus-within:ring-2 focus-within:ring-blue-500
                    ${checked 
                        ? 'bg-blue-600 border-blue-600 text-white shadow-md transform scale-[1.02]' 
                        : 'bg-white border-gray-200 hover:border-blue-500 hover:bg-blue-50 hover:text-blue-700 hover:shadow-md hover:-translate-y-1 text-gray-600'} ${className}`}
                >
                    <input type="checkbox" name={name} value={value} checked={checked} onChange={onChange} className="sr-only" />
                    <span className="text-center w-full">{label}</span>
                </label>
            );
        };

        // ★ Hover 再升級：輸入框加上淡藍色背景與微浮出
        const inputClass = "w-full text-sm border-b border-gray-300 py-1 px-1 focus:border-blue-600 focus:bg-white focus:rounded-md hover:border-blue-500 hover:bg-blue-50/50 hover:rounded-md hover:shadow-sm hover:-translate-y-0.5 transition-all duration-300 outline-none bg-transparent";

        function App() {
            const today = new Date().toISOString().split('T')[0];
            const firstInputRef = useRef(null);
            const [confirmReset, setConfirmReset] = useState(false);

            const initialFormData = {
                chartNumber: '', visitDate: today, visitOrder: '',
                weight: '', sbp: '', dbp: '', hr: '', age: '',
                hand: '右手', gender: '男', diet: '非全素',
                residence: '', residenceOther: '',
                marriage: '', childrenCount: '',
                jobCategory: '', job: '',
                toxicExposure: '', toxicExposureDetail: '',
                education: '', educationOther: '',
                history: [], historyOther: '',
                medications: [], medsOther: '', medsAntiplateletDetail: '',
                surgery: '無', surgeryDetails: '', brainSurgery: false, spineSurgery: false, cancerSurgery: false,
                familyHistory: '',
                animalsPlants: '無', animalsPlantsDetail: '',
                allergies: '無', allergyDrug: '', allergyFood: '',
                alcohol: '', alcoholDetail: '',
                smoking: '', smokingPacks: '', smokingYears: '', quitYears: '',
                travelHistory: [], travelHistoryOther: '',
                menopause: '', menopauseDate: '', pregnancy: '', hormoneDrug: ''
            };

            const [formData, setFormData] = useState(initialFormData);

            // 精簡版病歷摘要邏輯
            const summaryText = useMemo(() => {
                const {
                    visitDate, chartNumber, visitOrder, age, gender, residence, residenceOther, hand, diet, 
                    marriage, childrenCount, job, jobCategory, education, educationOther, toxicExposure, toxicExposureDetail,
                    history, historyOther, surgery, surgeryDetails, brainSurgery, spineSurgery, cancerSurgery, familyHistory,
                    travelHistory, travelHistoryOther, allergies, allergyDrug, allergyFood, alcohol, alcoholDetail, smoking, smokingYears, quitYears,
                    pregnancy, weight, sbp, dbp, hr, animalsPlants, animalsPlantsDetail,
                    menopause, hormoneDrug, medications, medsAntiplateletDetail, medsOther
                } = formData;

                const line1 = `[${visitDate || 'yyyy-mm-dd'}] First neuro visit. Chart No: ${chartNumber || '___'} / Order: ${visitOrder || '___'}`;

                const sex = gender === '男' ? 'M' : (gender === '女' ? 'F' : '?');
                const loc = residence === '其他' ? (residenceOther || 'Other') : (residence || 'Unknown');
                const hnd = hand === '右手' ? 'RH' : (hand === '左手' ? 'LH' : 'Unknown');
                const veg = diet === '全素' ? 'Veg(+)' : 'Veg(-)';
                
                let marStatus = marriage === '未婚' ? 'Single' : (marriage === '已婚' ? 'Married' : (marriage === '離婚' ? 'Divorced' : 'Unknown'));
                if ((marriage === '已婚' || marriage === '離婚') && childrenCount) marStatus += `(${childrenCount})`;

                let jobDisplay = jobCategory === '無' ? '無' : (jobCategory === '其他' || !jobCategory ? (job || '無') : (job ? `${jobCategory}(${job})` : jobCategory));
                let eduVal = education.match(/\d+/) ? education.match(/\d+/)[0] : (education === '未就學' ? '0' : '?');

                const line2 = `${age || '?'}y ${sex}, ${hnd}, Edu:${eduVal}, ${loc}, ${marStatus}, Job:${jobDisplay}, ${veg}`;

                // PHx
                const stdDiseases = { '糖尿病': 'DM', '高血壓': 'HTN', '高血脂': 'D/L', '痛風': 'Gout', '中風': 'Stroke', '心肌梗塞': 'MI', '癌症': 'Cancer' };
                const positives = [], negatives = [];
                Object.keys(stdDiseases).forEach(k => history.includes(k) ? positives.push(`${stdDiseases[k]}(+)`) : negatives.push(`${stdDiseases[k]}(-)`));
                history.forEach(h => { if (!stdDiseases[h] && h !== '其他') positives.push(h); });
                if (historyOther) positives.push(historyOther);
                const phxStr = `PHx: ${positives.length ? positives.join(', ') + ', ' : ''}${negatives.join(', ')}`;

                // RHx
                const medsList = [];
                if (medications.includes('抗血小板/抗凝血藥物')) medsList.push(`Antiplatelet(${medsAntiplateletDetail || '+'})`);
                if (medications.includes('心律不整藥物')) medsList.push('Anti-arrhythmic');
                if (medications.includes('中藥')) medsList.push('TCM');
                if (medications.includes('其他') && medsOther) medsList.push(medsOther);
                const rhxStr = medsList.length > 0 ? `RHx: ${medsList.join('/')}` : 'RHx: Nil';

                // SHx & FHx
                const surgs = [];
                if (brainSurgery) surgs.push("Brain Sx");
                if (spineSurgery) surgs.push("Spine Sx");
                if (cancerSurgery) surgs.push("Cancer Sx");
                if (surgeryDetails) surgs.push(surgeryDetails);
                const shxStr = (surgery === '有' || surgs.length > 0) ? `SHx: ${surgs.join('/') || 'Yes'}` : 'SHx: Nil';
                const fhxStr = familyHistory ? `FHx: ${familyHistory}` : 'FHx: Nil';

                const line3 = phxStr;
                const line4 = `${rhxStr} | ${shxStr} | ${fhxStr}`;

                // Habits
                const travArr = [...travelHistory];
                if (travelHistoryOther) travArr.push(travelHistoryOther);
                const trav = travArr.length > 0 ? `Travel(${travArr.join(',')})` : 'Travel(-)';
                const animal = animalsPlants === '有' ? `Animal(${animalsPlantsDetail || '+'})` : 'Animal(-)';
                const alg = allergies === '有' ? `Allergy(${[allergyDrug, allergyFood].filter(Boolean).join('/') || '+'})` : 'Allergy(-)';
                let alc = alcohol === '有' ? `Alc(+${alcoholDetail ? ':'+alcoholDetail : ''})` : (alcohol === '小酌' ? 'Alc(Social)' : 'Alc(-)');
                let smk = smoking === '有' ? `Smk(+${smokingYears ? ' '+smokingYears+'y' : ''})` : (smoking === '已戒菸' ? `Smk(Quit)` : 'Smk(-)');
                const tox = toxicExposure === '是' ? `Toxin(${toxicExposureDetail || '+'})` : 'Toxin(-)';

                const line5 = `${alg} | ${smk}, ${alc}, ${trav}, ${animal}, ${tox}`;

                // Gynecology
                let line6 = '';
                if (gender === '女') {
                    const mc = menopause === '已停經' ? 'MC(-)' : (menopause === '規則' ? 'MC(R)' : 'MC(IR)');
                    const preg = pregnancy === '確認無' ? 'Preg(-)' : 'Preg(+)';
                    const hrt = hormoneDrug === '是' ? 'HRT(+)' : 'HRT(-)';
                    line6 = `Gyne: ${mc}, ${preg}, ${hrt}`;
                }

                // Vitals
                const line7 = `Vitals: ${weight ? weight+'kg' : '_kg'}, BP ${sbp||'_'}/${dbp||'_'}, HR ${hr||'_'}`;

                return [line1, line2, line3, line4, line5, line6, line7].filter(Boolean).join('\n');
            }, [formData]);

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                if (type === 'checkbox') {
                    if (['spineSurgery', 'cancerSurgery', 'brainSurgery'].includes(name)) {
                         setFormData(prev => ({ ...prev, [name]: checked }));
                    } else if (name === 'travelHistory') {
                        setFormData(prev => ({ 
                            ...prev, 
                            travelHistory: checked ? [...(prev.travelHistory || []), value] : (prev.travelHistory || []).filter(i => i !== value) 
                        }));
                    } else {
                        setFormData(prev => ({ 
                            ...prev, 
                            [name]: checked ? [...(prev[name] || []), value] : (prev[name] || []).filter(i => i !== value) 
                        }));
                    }
                } else {
                    if (name === 'menopause' && value === '已停經') {
                        setFormData(prev => ({ ...prev, [name]: value, pregnancy: '確認無' }));
                    } else {
                        setFormData(prev => ({ ...prev, [name]: value }));
                    }
                }
            };

            const copySummary = () => {
                navigator.clipboard.writeText(summaryText);
                const btn = document.getElementById('copy-btn');
                const originalText = btn.innerText;
                btn.innerText = '已複製！';
                btn.classList.add('bg-green-100', 'text-green-800');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('bg-green-100', 'text-green-800');
                }, 2000);
            };

            const handleReset = () => {
                if (!confirmReset) {
                    setConfirmReset(true);
                    setTimeout(() => setConfirmReset(false), 3000);
                    return;
                }
                setFormData(initialFormData);
                setConfirmReset(false);
                if (firstInputRef.current) firstInputRef.current.focus();
            };

            return (
                <div className="min-h-screen py-2 px-2 sm:px-4 flex justify-center">
                    {/* 最外層唯一的主卡片 */}
                    <div className="bg-white w-full max-w-6xl rounded-xl shadow-lg p-4 md:p-6 space-y-4">
                        
                        {/* 標題與重設按鈕 */}
                        <header className="flex justify-between items-end border-b-2 border-gray-800 pb-2 mb-2">
                            <div>
                                <h1 className="text-xl md:text-2xl font-extrabold text-gray-900 tracking-wide">神經內科初診單</h1>
                                <p className="text-[11px] md:text-xs text-gray-500 mt-1">
                                    ※ 該問卷僅供門診使用，不作其他用途。 2024.09.12 廖醫師 (Rev. 2026.04)
                                </p>
                            </div>
                            <button 
                                onClick={handleReset} 
                                className={`border px-2 py-1 rounded text-xs transition-all duration-300 flex items-center gap-1 font-bold ${
                                    confirmReset ? 'bg-red-600 text-white border-red-600 shadow-md transform scale-105' : 'text-red-600 hover:text-red-800 border-red-200 hover:bg-red-50 hover:-translate-y-0.5 hover:shadow-sm'
                                }`}
                            >
                                {confirmReset ? '確定清除?' : '重設表單'}
                            </button>
                        </header>

                        {/* 1. Admin Info & Vitals (加強 Hover 邊框與浮出效果) */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 border-b border-gray-200 pb-3">
                            <div className="bg-blue-50/50 p-2 md:p-3 rounded-xl border border-blue-100 flex gap-2 hover:bg-blue-50 hover:shadow-lg hover:border-blue-300 hover:-translate-y-1 transition-all duration-300">
                                <div className="flex-[1.5]">
                                    <label className="text-[11px] font-bold text-gray-500 uppercase mb-0.5 block transition-colors group-hover:text-blue-600">Chart No. 病歷號</label>
                                    <input type="text" name="chartNumber" value={formData.chartNumber} onChange={handleChange} ref={firstInputRef}
                                        className={inputClass} placeholder="請輸入" />
                                </div>
                                <div className="flex-[1.5]">
                                    <label className="text-[11px] font-bold text-gray-500 uppercase mb-0.5 block transition-colors group-hover:text-blue-600">Date 日期</label>
                                    <input type="date" name="visitDate" value={formData.visitDate} onChange={handleChange} 
                                        className={inputClass} />
                                </div>
                                <div className="flex-1 shrink-0">
                                    <label className="text-[11px] font-bold text-gray-500 uppercase mb-0.5 block transition-colors group-hover:text-blue-600">Order 診號</label>
                                    <input type="text" name="visitOrder" value={formData.visitOrder} onChange={handleChange} 
                                        className={inputClass} placeholder="診號" />
                                </div>
                            </div>
                            
                            <div className="bg-red-50/50 p-2 md:p-3 rounded-xl border border-red-100 flex gap-2 items-end hover:bg-red-50 hover:shadow-lg hover:border-red-300 hover:-translate-y-1 transition-all duration-300">
                                <div className="w-16 shrink-0">
                                    <label className="text-[11px] font-bold text-gray-500 mb-0.5 block transition-colors group-hover:text-red-600">體重 (kg)</label>
                                    <input type="number" name="weight" value={formData.weight} onChange={handleChange} 
                                        className={`text-center ${inputClass}`} placeholder="kg" />
                                </div>
                                <div className="flex-1 flex items-center gap-1">
                                    <div className="flex-1">
                                        <label className="text-[10px] font-bold text-gray-400 mb-0.5 block text-center transition-colors group-hover:text-red-500">收縮 SBP</label>
                                        <input type="number" name="sbp" value={formData.sbp} onChange={handleChange} 
                                            className={`text-center ${inputClass}`} placeholder="mmHg" />
                                    </div>
                                    <span className="text-sm text-gray-300 pt-3">/</span>
                                    <div className="flex-1">
                                        <label className="text-[10px] font-bold text-gray-400 mb-0.5 block text-center transition-colors group-hover:text-red-500">舒張 DBP</label>
                                        <input type="number" name="dbp" value={formData.dbp} onChange={handleChange} 
                                            className={`text-center ${inputClass}`} placeholder="mmHg" />
                                    </div>
                                </div>
                                <div className="w-16 shrink-0">
                                    <label className="text-[10px] font-bold text-gray-400 mb-0.5 block text-center transition-colors group-hover:text-red-500">心跳 HR</label>
                                    <input type="number" name="hr" value={formData.hr} onChange={handleChange} 
                                        className={`text-center ${inputClass}`} placeholder="bpm" />
                                </div>
                            </div>
                        </div>

                        {/* --- Main 雙欄式扁平版面 --- */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-x-6 gap-y-2 items-start pt-2">
                            
                            {/* 👈 左欄 */}
                            <div className="flex flex-col w-full">
                                
                                {/* 標題：基本資料 (靛藍色系 Hover 縮排與底色加深) */}
                                <h2 className="text-[13px] font-extrabold text-indigo-800 border-b-2 border-indigo-200 hover:border-indigo-400 hover:bg-indigo-100/50 hover:pl-3 hover:shadow-sm transition-all duration-300 pb-1 mb-1 mt-2 uppercase tracking-wider rounded-t cursor-default">
                                    Demographics 基本資料
                                </h2>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
                                    <FormRow title="年齡" hoverColor="group-hover:text-indigo-600">
                                        <div className="flex items-center">
                                            <input type="number" name="age" value={formData.age} onChange={handleChange} className={`text-center ${inputClass}`} placeholder="歲數" />
                                            <span className="ml-1 font-bold text-gray-400 text-xs shrink-0">歲</span>
                                        </div>
                                    </FormRow>
                                    <FormRow title="生理性別" hoverColor="group-hover:text-indigo-600">
                                        <div className="flex gap-1 w-full">
                                            <RadioCard name="gender" value="男" checked={formData.gender === '男'} onChange={handleChange} label="男" />
                                            <RadioCard name="gender" value="女" checked={formData.gender === '女'} onChange={handleChange} label="女" />
                                        </div>
                                    </FormRow>
                                    <FormRow title="慣用手" hoverColor="group-hover:text-indigo-600">
                                        <div className="flex gap-1 w-full">
                                            <RadioCard name="hand" value="右手" checked={formData.hand === '右手'} onChange={handleChange} label="右手" />
                                            <RadioCard name="hand" value="左手" checked={formData.hand === '左手'} onChange={handleChange} label="左手" />
                                        </div>
                                    </FormRow>
                                    <FormRow title="飲食習慣" hoverColor="group-hover:text-indigo-600">
                                        <div className="flex gap-1 w-full">
                                            <RadioCard name="diet" value="非全素" checked={formData.diet === '非全素'} onChange={handleChange} label="葷/蛋" />
                                            <RadioCard name="diet" value="全素" checked={formData.diet === '全素'} onChange={handleChange} label="全素" />
                                        </div>
                                    </FormRow>
                                </div>

                                <FormRow title="婚姻狀況" hoverColor="group-hover:text-indigo-600">
                                    <div className="flex flex-col sm:flex-row gap-1.5 w-full">
                                        <div className="flex gap-1 w-full sm:w-auto">
                                            <RadioCard name="marriage" value="未婚" checked={formData.marriage === '未婚'} onChange={handleChange} label="未婚" />
                                            <RadioCard name="marriage" value="已婚" checked={formData.marriage === '已婚'} onChange={handleChange} label="已婚" />
                                            <RadioCard name="marriage" value="離婚" checked={formData.marriage === '離婚'} onChange={handleChange} label="離婚" />
                                        </div>
                                        {(formData.marriage === '已婚' || formData.marriage === '離婚') && (
                                            <div className="flex items-center flex-grow pl-2">
                                                <span className="font-bold text-xs text-gray-500 mr-1.5 whitespace-nowrap">子女數:</span>
                                                <input type="number" name="childrenCount" value={formData.childrenCount} onChange={handleChange} className={`w-16 text-center ${inputClass}`} />
                                            </div>
                                        )}
                                    </div>
                                </FormRow>

                                <FormRow title="居住地" hoverColor="group-hover:text-indigo-600">
                                    <div className="flex flex-wrap gap-1 w-full">
                                        {['宜蘭市', '羅東', '礁溪', '頭城', '壯圍', '員山', '台北', '其他'].map((place) => (
                                            <div className="flex-1 min-w-[45px]" key={place}>
                                                <RadioCard name="residence" value={place} checked={formData.residence === place} onChange={handleChange} label={place} />
                                            </div>
                                        ))}
                                    </div>
                                    {formData.residence === '其他' && (
                                        <input type="text" name="residenceOther" value={formData.residenceOther} onChange={handleChange} className={`mt-1 ${inputClass}`} placeholder="輸入地點" />
                                    )}
                                </FormRow>

                                {/* 標題：社會背景 (翠綠色系 Hover 縮排與底色加深) */}
                                <h2 className="text-[13px] font-extrabold text-emerald-800 border-b-2 border-emerald-200 hover:border-emerald-400 hover:bg-emerald-100/50 hover:pl-3 hover:shadow-sm transition-all duration-300 pb-1 mb-1 mt-4 uppercase tracking-wider rounded-t cursor-default">
                                    Social History 社會背景
                                </h2>

                                <FormRow title="職業" hoverColor="group-hover:text-emerald-600">
                                    <div className="flex flex-wrap gap-1 w-full">
                                        {['無', '家管', '農', '商', '工', '軍', '服務業', '其他'].map((cat) => (
                                            <div className="flex-1 min-w-[45px]" key={cat}>
                                                <RadioCard name="jobCategory" value={cat} checked={formData.jobCategory === cat} onChange={handleChange} label={cat} />
                                            </div>
                                        ))}
                                    </div>
                                    <input type="text" name="job" value={formData.job} onChange={handleChange} className={`mt-1 ${inputClass}`} placeholder="詳細職稱..." />
                                </FormRow>

                                <FormRow title="毒/揮發物?" hoverColor="group-hover:text-emerald-600">
                                    <div className="flex flex-col sm:flex-row gap-1.5 w-full">
                                        <div className="flex gap-1 w-full sm:w-1/4">
                                            <RadioCard name="toxicExposure" value="否" checked={formData.toxicExposure === '否'} onChange={handleChange} label="否" />
                                            <RadioCard name="toxicExposure" value="是" checked={formData.toxicExposure === '是'} onChange={handleChange} label="是" />
                                        </div>
                                        {formData.toxicExposure === '是' && (
                                            <input type="text" name="toxicExposureDetail" value={formData.toxicExposureDetail} onChange={handleChange} className={`flex-grow pl-1 ${inputClass}`} placeholder="說明物質..." />
                                        )}
                                    </div>
                                </FormRow>

                                <FormRow title="教育程度" hoverColor="group-hover:text-emerald-600">
                                    <div className="flex flex-wrap gap-1 w-full">
                                        {[ {v: '未就學', l: '未就學'}, {v: '國小(6)', l: '國小'}, {v: '國中(9)', l: '國中'}, {v: '高中(12)', l: '高中'}, 
                                           {v: '大學(16)', l: '大學'}, {v: '碩士(18)', l: '碩士'}, {v: '博士(22)', l: '博士'}, {v: '其他', l: '其他'}
                                        ].map((edu) => (
                                            <div className="flex-1 min-w-[45px]" key={edu.v}>
                                                <RadioCard name="education" value={edu.v} checked={formData.education === edu.v} onChange={handleChange} label={edu.l} />
                                            </div>
                                        ))}
                                    </div>
                                    {formData.education === '其他' && (
                                        <input type="text" name="educationOther" value={formData.educationOther} onChange={handleChange} className={`mt-1 ${inputClass}`} placeholder="說明" />
                                    )}
                                </FormRow>

                                {/* 女性專屬 */}
                                {formData.gender === '女' && (
                                    <div className="mt-4 pt-1">
                                        {/* 標題：婦科病史 (粉紅色系 Hover 縮排與底色加深) */}
                                        <h2 className="text-[13px] font-extrabold text-pink-700 border-b-2 border-pink-200 hover:border-pink-400 hover:bg-pink-100/50 hover:pl-3 hover:shadow-sm transition-all duration-300 pb-1 mb-1 flex items-center uppercase tracking-wider rounded-t cursor-default">
                                            <span className="bg-pink-100 text-pink-800 px-1.5 py-0.5 rounded text-[10px] mr-1.5">Female</span>
                                            Gynecology 婦科病史
                                        </h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
                                            <FormRow title="月經狀況" labelClass="text-pink-700" hoverColor="group-hover:text-pink-500">
                                                <div className="flex flex-col gap-1 w-full">
                                                    <div className="flex gap-1 w-full">
                                                        <RadioCard name="menopause" value="已停經" checked={formData.menopause === '已停經'} onChange={handleChange} label="已停經" />
                                                        <RadioCard name="menopause" value="不規則" checked={formData.menopause === '不規則'} onChange={handleChange} label="不規則" />
                                                        <RadioCard name="menopause" value="規則" checked={formData.menopause === '規則'} onChange={handleChange} label="規則" />
                                                    </div>
                                                    {formData.menopause === '規則' && (
                                                        <div className="flex items-center gap-1.5 pl-1">
                                                            <span className="text-[11px] font-bold text-pink-600">上次:</span>
                                                            <input type="date" name="menopauseDate" value={formData.menopauseDate} onChange={handleChange} className={`text-xs flex-grow ${inputClass} focus:border-pink-500 hover:border-pink-400 hover:bg-pink-50/50 border-pink-200`} />
                                                        </div>
                                                    )}
                                                </div>
                                            </FormRow>
                                            <div className="flex flex-col">
                                                <FormRow title="懷孕狀況" labelClass="text-pink-700" hoverColor="group-hover:text-pink-500">
                                                    <div className="flex gap-1 w-full">
                                                        <RadioCard name="pregnancy" value="確認無" checked={formData.pregnancy === '確認無'} onChange={handleChange} label="無" />
                                                        <RadioCard name="pregnancy" value="可能/準備中" checked={formData.pregnancy === '可能/準備中'} onChange={handleChange} label="準備/可能" />
                                                    </div>
                                                </FormRow>
                                                <FormRow title="賀爾蒙藥" labelClass="text-pink-700" hoverColor="group-hover:text-pink-500">
                                                    <div className="flex gap-1 w-full sm:w-1/2">
                                                        <RadioCard name="hormoneDrug" value="否" checked={formData.hormoneDrug === '否'} onChange={handleChange} label="否" />
                                                        <RadioCard name="hormoneDrug" value="是" checked={formData.hormoneDrug === '是'} onChange={handleChange} label="是" />
                                                    </div>
                                                </FormRow>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* 👉 右欄 */}
                            <div className="flex flex-col w-full">
                                
                                {/* 標題：過去病史 (紫羅蘭色系 Hover 縮排與底色加深) */}
                                <h2 className="text-[13px] font-extrabold text-violet-800 border-b-2 border-violet-200 hover:border-violet-400 hover:bg-violet-100/50 hover:pl-3 hover:shadow-sm transition-all duration-300 pb-1 mb-1 mt-2 uppercase tracking-wider rounded-t cursor-default">
                                    Medical History 過去病史
                                </h2>

                                <FormRow title="過去病史" hoverColor="group-hover:text-violet-600">
                                    <div className="flex flex-wrap gap-1 w-full">
                                        {['糖尿病', '高血壓', '高血脂', '痛風', '中風', '心肌梗塞', '癌症', '其他'].map((d) => (
                                            <div className="flex-1 min-w-[65px]" key={d}>
                                                <CheckboxButton name="history" value={d} checked={formData.history.includes(d)} onChange={handleChange} label={d} />
                                            </div>
                                        ))}
                                    </div>
                                    {formData.history.includes('其他') && (
                                        <input type="text" name="historyOther" value={formData.historyOther} onChange={handleChange} className={`mt-1 ${inputClass}`} placeholder="補充病史..." />
                                    )}
                                </FormRow>

                                <FormRow title="目前用藥" hoverColor="group-hover:text-violet-600">
                                    <div className="flex flex-wrap gap-1 w-full">
                                        <div className="flex-[1.5] min-w-[100px]"><CheckboxButton name="medications" value="抗血小板/抗凝血藥物" checked={formData.medications.includes('抗血小板/抗凝血藥物')} onChange={handleChange} label="抗血小板/凝血" /></div>
                                        <div className="flex-1 min-w-[65px]"><CheckboxButton name="medications" value="心律不整藥物" checked={formData.medications.includes('心律不整藥物')} onChange={handleChange} label="心律不整" /></div>
                                        <div className="flex-1 min-w-[45px]"><CheckboxButton name="medications" value="中藥" checked={formData.medications.includes('中藥')} onChange={handleChange} label="中藥" /></div>
                                        <div className="flex-1 min-w-[45px]"><CheckboxButton name="medications" value="其他" checked={formData.medications.includes('其他')} onChange={handleChange} label="其他" /></div>
                                    </div>
                                    
                                    {(formData.medications.includes('抗血小板/抗凝血藥物') || formData.medications.includes('其他')) && (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-1 pl-1">
                                            {formData.medications.includes('抗血小板/抗凝血藥物') && (
                                                <input type="text" name="medsAntiplateletDetail" value={formData.medsAntiplateletDetail} onChange={handleChange} className={inputClass} placeholder="抗血小板藥名..." />
                                            )}
                                            {formData.medications.includes('其他') && (
                                                <input type="text" name="medsOther" value={formData.medsOther} onChange={handleChange} className={inputClass} placeholder="其他藥物..." />
                                            )}
                                        </div>
                                    )}
                                </FormRow>

                                <FormRow title="手術史" hoverColor="group-hover:text-violet-600">
                                    <div className="flex flex-col sm:flex-row gap-1.5 w-full">
                                        <div className="flex gap-1 w-full sm:w-1/4">
                                            <RadioCard name="surgery" value="無" checked={formData.surgery === '無'} onChange={handleChange} label="無" />
                                            <RadioCard name="surgery" value="有" checked={formData.surgery === '有'} onChange={handleChange} label="有" />
                                        </div>
                                        {formData.surgery === '有' && (
                                            <div className="flex flex-col gap-1 flex-grow animate-fade-in pl-1 border-l-2 border-gray-100">
                                                <div className="flex gap-1">
                                                    <CheckboxButton name="brainSurgery" value="true" checked={formData.brainSurgery} onChange={handleChange} label="腦" className="flex-1" />
                                                    <CheckboxButton name="spineSurgery" value="true" checked={formData.spineSurgery} onChange={handleChange} label="脊椎" className="flex-1" />
                                                    <CheckboxButton name="cancerSurgery" value="true" checked={formData.cancerSurgery} onChange={handleChange} label="癌症" className="flex-1" />
                                                </div>
                                                <input type="text" name="surgeryDetails" value={formData.surgeryDetails} onChange={handleChange} className={inputClass} placeholder="其他項目/年份..." />
                                            </div>
                                        )}
                                    </div>
                                </FormRow>

                                <FormRow title="家族病史" hoverColor="group-hover:text-violet-600">
                                    <input type="text" name="familyHistory" value={formData.familyHistory} onChange={handleChange} className={inputClass} placeholder="無，或請詳述..." />
                                </FormRow>

                                {/* 標題：習慣與接觸史 (琥珀橘色系 Hover 縮排與底色加深) */}
                                <h2 className="text-[13px] font-extrabold text-amber-700 border-b-2 border-amber-200 hover:border-amber-400 hover:bg-amber-100/50 hover:pl-3 hover:shadow-sm transition-all duration-300 pb-1 mb-1 mt-4 uppercase tracking-wider rounded-t cursor-default">
                                    Habits & Exposure 習慣與接觸
                                </h2>

                                <FormRow title="過敏史" hoverColor="group-hover:text-amber-600">
                                    <div className="flex flex-col sm:flex-row gap-1.5 w-full items-start">
                                        <div className="flex gap-1 w-full sm:w-1/4">
                                            <RadioCard name="allergies" value="無" checked={formData.allergies === '無'} onChange={handleChange} label="無" />
                                            <RadioCard name="allergies" value="有" checked={formData.allergies === '有'} onChange={handleChange} label="有" />
                                        </div>
                                        {formData.allergies === '有' && (
                                            <div className="flex gap-2 flex-grow animate-fade-in w-full pl-1">
                                                <div className="flex items-center gap-1 flex-1">
                                                    <span className="font-bold text-[11px] text-gray-500 shrink-0">藥物</span>
                                                    <input type="text" name="allergyDrug" value={formData.allergyDrug} onChange={handleChange} className={inputClass} placeholder="請輸入藥名" />
                                                </div>
                                                <div className="flex items-center gap-1 flex-1">
                                                    <span className="font-bold text-[11px] text-gray-500 shrink-0">食物</span>
                                                    <input type="text" name="allergyFood" value={formData.allergyFood} onChange={handleChange} className={inputClass} placeholder="請輸入食物" />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </FormRow>

                                <FormRow title="動植接觸" hoverColor="group-hover:text-amber-600">
                                    <div className="flex flex-col sm:flex-row gap-1.5 w-full">
                                        <div className="flex gap-1 w-full sm:w-1/4">
                                            <RadioCard name="animalsPlants" value="無" checked={formData.animalsPlants === '無'} onChange={handleChange} label="無" />
                                            <RadioCard name="animalsPlants" value="有" checked={formData.animalsPlants === '有'} onChange={handleChange} label="有" />
                                        </div>
                                        {formData.animalsPlants === '有' && (
                                            <input type="text" name="animalsPlantsDetail" value={formData.animalsPlantsDetail} onChange={handleChange} className={`flex-grow pl-1 ${inputClass}`} placeholder="說明 (如養貓)..." />
                                        )}
                                    </div>
                                </FormRow>

                                <FormRow title="旅遊史" hoverColor="group-hover:text-amber-600">
                                    <div className="flex flex-col gap-1 w-full overflow-hidden">
                                        <div className="flex flex-nowrap overflow-x-auto gap-1 pb-1 w-full hide-scrollbar">
                                            {['無', '台灣', '日本', '韓國', '美國', '中國'].map((loc) => (
                                                <CheckboxButton key={loc} name="travelHistory" value={loc} checked={formData.travelHistory.includes(loc)} onChange={handleChange} label={loc} className="shrink-0 min-w-[55px]" />
                                            ))}
                                        </div>
                                        <input type="text" name="travelHistoryOther" value={formData.travelHistoryOther} onChange={handleChange} className={inputClass} placeholder="其他地點..." />
                                    </div>
                                </FormRow>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
                                    <FormRow title="飲酒" hoverColor="group-hover:text-amber-600">
                                        <div className="flex flex-col gap-1 w-full">
                                            <div className="flex gap-1 w-full">
                                                <RadioCard name="alcohol" value="無" checked={formData.alcohol === '無'} onChange={handleChange} label="無" />
                                                <RadioCard name="alcohol" value="小酌" checked={formData.alcohol === '小酌'} onChange={handleChange} label="小酌" />
                                                <RadioCard name="alcohol" value="有" checked={formData.alcohol === '有'} onChange={handleChange} label="有" />
                                            </div>
                                            {formData.alcohol === '有' && (
                                                <input type="text" name="alcoholDetail" value={formData.alcoholDetail} onChange={handleChange} className={`animate-fade-in ${inputClass}`} placeholder="說明..." />
                                            )}
                                        </div>
                                    </FormRow>

                                    <FormRow title="抽菸" hoverColor="group-hover:text-amber-600">
                                        <div className="flex flex-col gap-1 w-full">
                                            <div className="flex gap-1 w-full">
                                                <RadioCard name="smoking" value="無" checked={formData.smoking === '無'} onChange={handleChange} label="無" />
                                                <RadioCard name="smoking" value="已戒菸" checked={formData.smoking === '已戒菸'} onChange={handleChange} label="戒菸" />
                                                <RadioCard name="smoking" value="有" checked={formData.smoking === '有'} onChange={handleChange} label="有" />
                                            </div>
                                            {(formData.smoking === '有' || formData.smoking === '已戒菸') && (
                                                <div className="animate-fade-in flex items-center gap-1 text-[11px] text-gray-500 mt-0.5">
                                                    {formData.smoking === '有' ? '一天' : '共抽'}
                                                    <input type="number" name="smokingPacks" value={formData.smokingPacks} onChange={handleChange} className={`w-10 text-center ${inputClass}`} />
                                                    {formData.smoking === '有' ? '包, 已抽' : '年, 已戒'}
                                                    <input type="number" name={formData.smoking === '有' ? "smokingYears" : "quitYears"} value={formData.smoking === '有' ? formData.smokingYears : formData.quitYears} onChange={handleChange} className={`w-10 text-center ${inputClass}`} />
                                                    年
                                                </div>
                                            )}
                                        </div>
                                    </FormRow>
                                </div>
                            </div>

                        </div>

                        {/* 輕量化 Summary Section */}
                        <section className="mt-6 border border-gray-200 bg-gray-50 rounded-lg p-3 group hover:shadow-md transition-shadow duration-300">
                            <div className="flex justify-between items-center mb-1.5">
                                <h3 className="font-bold flex items-center text-sm text-gray-700 group-hover:text-blue-700 transition-colors duration-300 cursor-default">
                                    <span className="w-1.5 h-1.5 bg-blue-500 rounded-full mr-1.5"></span>
                                    病歷摘要 (Auto-Summary)
                                </h3>
                                <button id="copy-btn" onClick={copySummary} className="bg-white border border-gray-300 hover:bg-gray-100 hover:shadow-md hover:-translate-y-0.5 text-gray-700 font-bold text-[11px] px-3 py-1 rounded transition-all duration-300 outline-none shadow-sm">
                                    複製 Copy
                                </button>
                            </div>
                            <textarea 
                                readOnly 
                                value={summaryText} 
                                className="w-full h-28 bg-white text-gray-800 font-mono text-[13px] sm:text-sm p-2.5 rounded border border-gray-300 focus:outline-none focus:border-blue-400 hover:shadow-inner hover:border-blue-300 transition-all duration-300 leading-relaxed resize-none"
                            ></textarea>
                        </section>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
