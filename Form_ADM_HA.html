<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住院頭痛日記生成系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page {
                size: A4 landscape;
                margin: 0.5cm;
            }
            .no-print {
                display: none !important;
            }
            body {
                background-color: white !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact;
            }
            .print-container {
                box-shadow: none !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: none !important;
                padding: 0.5cm !important;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed;
            }
            th, td {
                border: 1px solid black !important;
            }
        }

        /* 調整表格字體與大小 */
        .diary-table th, .diary-table td {
            padding: 2px;
            text-align: center;
            font-size: 13px; 
            border: 1px solid #9ca3af;
            word-break: break-all;
        }
        
        /* 針對日期標題特別放大 */
        .date-header {
            font-size: 18px !important;
            font-weight: bold;
            height: 45px;
        }

        .hour-col {
            width: 60px;
            background-color: #f3f4f6;
            font-weight: bold;
            font-size: 12px;
        }
        
        .instruction-box {
            border: 2px solid #3b82f6;
            border-radius: 8px;
            flex: 1;
        }

        .sticker-box {
            border: 2px dashed #9ca3af;
            border-radius: 8px;
            width: 250px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-weight: bold;
            text-align: center;
        }

        /* 讓內容在網頁上可編輯時有視覺反饋 */
        [contenteditable="true"]:focus {
            background-color: #fff9c4;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 font-sans">

    <!-- 控制面板 (列印時隱藏) -->
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md mb-8 no-print">
        <h1 class="text-2xl font-bold mb-4 text-blue-800 flex items-center gap-2">
            <span>🏥 住院頭痛日記生成系統</span>
        </h1>
        <div class="flex flex-wrap items-end gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">設定起始日期</label>
                <input type="date" id="startDateInput" class="border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button onclick="updateDates()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition shadow-sm">
                更新日期
            </button>
            <button onclick="handlePrint()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded transition flex items-center gap-2 shadow-sm">
                <span>🖨️ 列印 A4 頁面</span>
            </button>
        </div>
        <div class="mt-4 p-3 bg-yellow-50 border-l-4 border-yellow-400 text-sm text-yellow-800">
            <strong>列印提醒：</strong> 請確保印表機設定為<strong>「橫向」</strong>。若瀏覽器攔截彈窗，請使用 Ctrl+P 手動列印。
        </div>
    </div>

    <!-- 日記主體 (列印區域) -->
    <div class="print-container max-w-[29.7cm] mx-auto bg-white p-8 shadow-lg min-h-screen">
        <header class="mb-4">
            <h2 class="text-3xl font-bold text-center mb-6">住院頭痛日記 (14 天)</h2>
            
            <div class="flex gap-4 items-stretch mb-4">
                <!-- 填寫提示 -->
                <div class="instruction-box p-4 bg-blue-50 text-blue-900">
                    <p class="font-bold mb-1">💡 填寫提示：</p>
                    <ol class="list-decimal ml-5 text-sm space-y-1">
                        <li>請依您的<strong>主觀疼痛程度</strong>，填寫各時段的頭痛嚴重度 (0-10 分，0 代表不痛，10 代表最痛)。</li>
                        <li>睡眠時段可直接空白或加註 "<strong>Z</strong>"。</li>
                        <li>有向護理師要求非常規（<strong>PRN使用</strong>）之止痛針／口服止痛藥時請註明 (例如：藥名/時間)。</li>
                    </ol>
                </div>

                <!-- 病歷貼紙框 -->
                <div class="sticker-box">
                    在此貼病歷貼紙<br>(Patient ID Sticker)
                </div>
            </div>
        </header>

        <table class="diary-table w-full border-collapse">
            <thead>
                <tr id="header-dates">
                    <th class="hour-col">日期</th>
                    <!-- JS 動態插入日期 -->
                </tr>
                <tr id="header-days" class="bg-gray-50">
                    <th class="hour-col">星期</th>
                    <!-- JS 動態插入星期 -->
                </tr>
            </thead>
            <tbody id="diary-body">
                <!-- JS 動態插入 0-23 小時 -->
            </tbody>
        </table>

        <footer class="mt-6 text-xs text-gray-400 text-right">
            系統生成時間：<span id="gen-time"></span>
        </footer>
    </div>

    <script>
        // 初始化日期設定
        const startDateInput = document.getElementById('startDateInput');
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        startDateInput.value = `${year}-${month}-${day}`;

        function updateDates() {
            const dateVal = startDateInput.value;
            if (!dateVal) return;

            const start = new Date(dateVal);
            const headerDates = document.getElementById('header-dates');
            const headerDays = document.getElementById('header-days');
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

            while (headerDates.cells.length > 1) headerDates.deleteCell(1);
            while (headerDays.cells.length > 1) headerDays.deleteCell(1);

            for (let i = 0; i < 14; i++) {
                const currentDate = new Date(start);
                currentDate.setDate(start.getDate() + i);
                
                const thDate = document.createElement('th');
                thDate.className = 'date-col date-header';
                thDate.innerHTML = `${currentDate.getMonth() + 1}/${currentDate.getDate()}`;
                headerDates.appendChild(thDate);

                const thDay = document.createElement('th');
                thDay.className = 'date-col text-sm';
                thDay.innerHTML = dayNames[currentDate.getDay()];
                if (currentDate.getDay() === 0 || currentDate.getDay() === 6) {
                    thDay.classList.add('text-red-600', 'font-bold');
                }
                headerDays.appendChild(thDay);
            }
        }

        function buildTableBody() {
            const tbody = document.getElementById('diary-body');
            tbody.innerHTML = '';

            for (let hour = 0; hour < 24; hour++) {
                const tr = document.createElement('tr');
                
                const tdHour = document.createElement('td');
                tdHour.className = 'hour-col';
                tdHour.innerHTML = `${hour}:00`;
                tr.appendChild(tdHour);

                for (let day = 0; day < 14; day++) {
                    const td = document.createElement('td');
                    td.contentEditable = "true"; 
                    td.className = 'h-7'; 
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function handlePrint() {
            try {
                window.print();
            } catch (e) {
                console.error("Print failed: ", e);
                window.alert("無法開啟列印視窗，請嘗試按下 Ctrl + P 手動列印。");
            }
        }

        window.onload = function() {
            updateDates();
            buildTableBody();
            document.getElementById('gen-time').innerText = new Date().toLocaleString('zh-TW');
        };
    </script>
</body>
</html>
