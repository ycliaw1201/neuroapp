<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住院頭痛日記生成系統 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 強制 A4 橫向列印設定 */
        @media print {
            @page {
                size: A4 landscape;
                margin: 0.5cm;
            }
            .no-print {
                display: none !important;
            }
            body {
                background-color: white !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact;
            }
            .print-container {
                box-shadow: none !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 0.2cm !important;
            }
            table {
                width: 100% !important;
                border-collapse: collapse;
                table-layout: fixed; /* 固定佈局確保 14 天等寬 */
            }
            th, td {
                border: 1.5px solid black !important; /* 加深列印線條 */
            }
        }

        /* 螢幕預覽樣式 - 模擬橫向 A4 比例 */
        .print-container {
            width: 29.7cm; /* A4 寬度 */
            min-height: 21cm; /* A4 高度 */
            background: white;
            margin: 0 auto;
            padding: 1cm;
        }

        /* 表格細節 */
        .diary-table th, .diary-table td {
            padding: 2px;
            text-align: center;
            font-size: 13px; 
            border: 1px solid #6b7280;
            word-break: break-all;
        }
        
        /* 放大日期標題 */
        .date-header {
            font-size: 18px !important;
            font-weight: bold;
            height: 40px;
        }

        .hour-col {
            width: 55px;
            background-color: #f3f4f6;
            font-weight: bold;
            font-size: 12px;
        }
        
        .instruction-box {
            border: 2px solid #3b82f6;
            border-radius: 8px;
            flex: 1;
        }

        .sticker-box {
            border: 2px dashed #9ca3af;
            border-radius: 8px;
            width: 260px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
        }

        /* 網頁端輸入輔助 */
        [contenteditable="true"]:focus {
            background-color: #fef9c3;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-200 p-4 font-sans">

    <!-- 控制面板 (列印時隱藏) -->
    <div class="max-w-[29.7cm] mx-auto bg-white p-6 rounded-lg shadow-md mb-8 no-print border-b-4 border-blue-600">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-blue-800">🏥 住院頭痛日記生成系統</h1>
            <button onclick="handlePrint()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg transition flex items-center gap-2 shadow-lg scale-110">
                <span>🖨️ 立即列印 (A4 橫向)</span>
            </button>
        </div>
        
        <div class="flex items-end gap-6 bg-gray-50 p-4 rounded-md">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">📅 設定起始日期</label>
                <input type="date" id="startDateInput" class="border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none w-48">
            </div>
            <button onclick="updateDates()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition shadow-sm">
                更新表格日期
            </button>
            <div class="text-sm text-gray-500 italic">
                * 表格內的空格可以直接在瀏覽器點擊輸入，完成後再列印。
            </div>
        </div>
    </div>

    <!-- 日記主體 (列印區域) -->
    <div class="print-container shadow-2xl">
        <header class="mb-4">
            <h2 class="text-3xl font-bold text-center mb-6 tracking-widest text-gray-800">住院頭痛日記 (14 天)</h2>
            
            <div class="flex gap-4 items-stretch mb-4">
                <!-- 填寫提示 -->
                <div class="instruction-box p-4 bg-blue-50 text-blue-900 border-blue-200">
                    <p class="font-bold mb-1 text-base">💡 填寫提示：</p>
                    <ul class="list-disc ml-5 text-sm space-y-1">
                        <li>請依您的<strong>主觀疼痛程度</strong>，填寫各時段的嚴重度 (<strong>0-10分</strong>，0不痛，10最痛)。</li>
                        <li>睡眠時段可直接空白或加註 "<strong>Z</strong>"。</li>
                        <li>若有向護理師要求非常規（<strong>PRN使用</strong>）之藥物，請註明（如：止痛針、口服藥）。</li>
                    </ul>
                </div>

                <!-- 病歷貼紙框 -->
                <div class="sticker-box bg-gray-50">
                    在此黏貼病歷貼紙<br>
                    <span class="text-xs font-normal mt-1 text-gray-400">(Affix Patient ID Sticker Here)</span>
                </div>
            </div>
        </header>

        <table class="diary-table w-full">
            <thead>
                <tr id="header-dates" class="bg-gray-100">
                    <th class="hour-col">日期</th>
                    <!-- JS 動態插入日期 -->
                </tr>
                <tr id="header-days" class="bg-gray-50">
                    <th class="hour-col text-xs text-gray-500 font-normal">星期</th>
                    <!-- JS 動態插入星期 -->
                </tr>
            </thead>
            <tbody id="diary-body">
                <!-- JS 動態插入 0-23 小時 -->
            </tbody>
        </table>

        <div class="flex justify-between mt-4 px-2">
            <div class="text-xs text-gray-500">
                註：若一天內有多次發作，可在同一格內以斜線分隔記錄。
            </div>
            <div class="text-xs text-gray-400">
                製表日期：<span id="gen-time"></span>
            </div>
        </div>
    </div>

    <script>
        const startDateInput = document.getElementById('startDateInput');
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        startDateInput.value = `${year}-${month}-${day}`;

        function updateDates() {
            const dateVal = startDateInput.value;
            if (!dateVal) return;

            const start = new Date(dateVal);
            const headerDates = document.getElementById('header-dates');
            const headerDays = document.getElementById('header-days');
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

            while (headerDates.cells.length > 1) headerDates.deleteCell(1);
            while (headerDays.cells.length > 1) headerDays.deleteCell(1);

            for (let i = 0; i < 14; i++) {
                const currentDate = new Date(start);
                currentDate.setDate(start.getDate() + i);
                
                const thDate = document.createElement('th');
                thDate.className = 'date-col date-header';
                thDate.innerHTML = `${currentDate.getMonth() + 1}/${currentDate.getDate()}`;
                headerDates.appendChild(thDate);

                const thDay = document.createElement('th');
                thDay.className = 'date-col text-sm';
                thDay.innerHTML = dayNames[currentDate.getDay()];
                if (currentDate.getDay() === 0 || currentDate.getDay() === 6) {
                    thDay.classList.add('text-red-600', 'font-bold');
                }
                headerDays.appendChild(thDay);
            }
        }

        function buildTableBody() {
            const tbody = document.getElementById('diary-body');
            tbody.innerHTML = '';

            for (let hour = 0; hour < 24; hour++) {
                const tr = document.createElement('tr');
                
                const tdHour = document.createElement('td');
                tdHour.className = 'hour-col text-gray-700';
                tdHour.innerHTML = `${hour}:00`;
                tr.appendChild(tdHour);

                for (let day = 0; day < 14; day++) {
                    const td = document.createElement('td');
                    td.contentEditable = "true"; 
                    td.className = 'h-[28px]'; // 微調高度確保一頁 A4 塞得下
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function handlePrint() {
            try {
                window.print();
            } catch (e) {
                alert("列印失敗，請嘗試按 Ctrl+P (或 Cmd+P) 手動列印。");
            }
        }

        window.onload = function() {
            updateDates();
            buildTableBody();
            document.getElementById('gen-time').innerText = new Date().toLocaleString('zh-TW');
        };
    </script>
</body>
</html>
