<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住院頭痛日記生成系統 (極簡單頁版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 強制 A4 橫向列印設定 */
        @media print {
            @page {
                size: A4 landscape;
                margin: 0.5cm;
            }
            .no-print {
                display: none !important;
            }
            body {
                background-color: white !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact;
            }
            .print-container {
                box-shadow: none !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 0.1cm !important;
            }
            table {
                width: 100% !important;
                border-collapse: collapse;
                table-layout: fixed;
            }
            th, td {
                border: 1.2px solid black !important;
            }
        }

        /* 螢幕預覽樣式 */
        .print-container {
            width: 29.7cm; 
            min-height: 20cm;
            background: white;
            margin: 0 auto;
            padding: 0.8cm;
        }

        /* 表格細節優化 */
        .diary-table th, .diary-table td {
            padding: 1px;
            text-align: center;
            font-size: 12px; 
            border: 1px solid #6b7280;
        }
        
        .date-header {
            font-size: 16px !important;
            font-weight: bold;
            height: 34px;
        }

        .hour-col {
            width: 50px;
            background-color: #f9fafb;
            font-weight: bold;
            font-size: 11px;
        }
        
        .instruction-box {
            border: 1px solid #3b82f6;
            border-radius: 4px;
            flex: 1;
        }

        .sticker-box {
            border: 1.5px dashed #9ca3af;
            border-radius: 4px;
            width: 220px;
            height: 75px; /* 縮小高度 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-weight: bold;
            text-align: center;
            font-size: 13px;
        }

        /* 網頁端輸入輔助 */
        [contenteditable="true"]:focus {
            background-color: #fef9c3;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-200 p-2 font-sans">

    <!-- 控制面板 -->
    <div class="max-w-[29.7cm] mx-auto bg-white p-4 rounded-lg shadow-md mb-4 no-print border-b-2 border-blue-600">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-800">🏥 住院頭痛日記生成系統</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <label class="text-sm font-medium text-gray-700">起始日期:</label>
                    <input type="date" id="startDateInput" class="border border-gray-300 rounded px-2 py-1 text-sm outline-none w-40">
                </div>
                <button onclick="updateDates()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-1 px-4 rounded transition">
                    更新日期
                </button>
                <button onclick="handlePrint()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-1 px-6 rounded transition flex items-center gap-2">
                    <span>🖨️ 立即列印</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 日記主體 (列印區域) -->
    <div class="print-container shadow-xl">
        <header>
            <h2 class="text-2xl font-bold text-center mb-3 tracking-tighter text-gray-800">住院頭痛日記 (14 天)</h2>
            
            <div class="flex gap-3 items-stretch mb-2">
                <!-- 縮小後的填寫提示 -->
                <div class="instruction-box p-2 bg-blue-50 text-blue-900 border-blue-200">
                    <div class="flex gap-4 text-xs leading-tight">
                        <div class="font-bold shrink-0">💡 提示:</div>
                        <ul class="flex flex-wrap gap-x-4 gap-y-1 list-none p-0 m-0">
                            <li>1. 請填寫主觀嚴重度 (<strong>0-10分</strong>，0不痛，10最痛)</li>
                            <li>2. 睡眠可空白或標註 "<strong>Z</strong>"</li>
                            <li>3. 有使用非常規（<strong>PRN</strong>）藥物請註明（如止痛針/藥）</li>
                        </ul>
                    </div>
                </div>

                <!-- 縮小後的貼紙框 -->
                <div class="sticker-box bg-gray-50 shrink-0">
                    在此黏貼病歷貼紙
                </div>
            </div>
        </header>

        <table class="diary-table w-full">
            <thead>
                <tr id="header-dates" class="bg-gray-50">
                    <th class="hour-col">日期</th>
                    <!-- JS 動態插入日期 -->
                </tr>
                <tr id="header-days">
                    <th class="hour-col text-[10px] text-gray-400 font-normal">星期</th>
                    <!-- JS 動態插入星期 -->
                </tr>
            </thead>
            <tbody id="diary-body">
                <!-- JS 動態插入 0-23 小時 -->
            </tbody>
        </table>

        <div class="flex justify-between mt-2 px-1 items-center">
            <div class="text-[10px] text-gray-400 italic">
                * 若一天多次發作可斜線分隔記錄。
            </div>
            <div class="text-[10px] text-gray-400">
                製表日期：<span id="gen-time"></span>
            </div>
        </div>
    </div>

    <script>
        const startDateInput = document.getElementById('startDateInput');
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        startDateInput.value = `${year}-${month}-${day}`;

        function updateDates() {
            const dateVal = startDateInput.value;
            if (!dateVal) return;

            const start = new Date(dateVal);
            const headerDates = document.getElementById('header-dates');
            const headerDays = document.getElementById('header-days');
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

            while (headerDates.cells.length > 1) headerDates.deleteCell(1);
            while (headerDays.cells.length > 1) headerDays.deleteCell(1);

            for (let i = 0; i < 14; i++) {
                const currentDate = new Date(start);
                currentDate.setDate(start.getDate() + i);
                
                const thDate = document.createElement('th');
                thDate.className = 'date-col date-header';
                thDate.innerHTML = `${currentDate.getMonth() + 1}/${currentDate.getDate()}`;
                headerDates.appendChild(thDate);

                const thDay = document.createElement('th');
                thDay.className = 'date-col text-[11px]';
                thDay.innerHTML = dayNames[currentDate.getDay()];
                if (currentDate.getDay() === 0 || currentDate.getDay() === 6) {
                    thDay.classList.add('text-red-600', 'font-bold');
                }
                headerDays.appendChild(thDay);
            }
        }

        function buildTableBody() {
            const tbody = document.getElementById('diary-body');
            tbody.innerHTML = '';

            for (let hour = 0; hour < 24; hour++) {
                const tr = document.createElement('tr');
                
                const tdHour = document.createElement('td');
                tdHour.className = 'hour-col text-gray-600';
                tdHour.innerHTML = `${hour}:00`;
                tr.appendChild(tdHour);

                for (let day = 0; day < 14; day++) {
                    const td = document.createElement('td');
                    td.contentEditable = "true"; 
                    td.className = 'h-[25px]'; // 再縮小高度，確保不溢出
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function handlePrint() {
            try {
                window.print();
            } catch (e) {
                alert("請嘗試按 Ctrl+P 手動列印。");
            }
        }

        window.onload = function() {
            updateDates();
            buildTableBody();
            document.getElementById('gen-time').innerText = new Date().toLocaleString('zh-TW');
        };
    </script>
</body>
</html>
